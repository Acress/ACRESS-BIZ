<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACR · Catalyst Intelligence</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'IBM Plex Mono', 'Courier New', monospace;
    background: #111;
    color: #e0e0d8;
    font-size: 12px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* TOPBAR */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    border-bottom: 1px solid #2a2a2a;
    background: #161616;
    flex-shrink: 0;
    flex-wrap: wrap;
    gap: 6px;
  }
  .logo { font-size: 11px; font-weight: 500; letter-spacing: .16em; color: #888; }
  .logo span { color: #C9922A; }
  .regime-badge {
    display: flex; align-items: center; gap: 5px;
    font-size: 9px; letter-spacing: .1em;
    padding: 3px 8px; border-radius: 3px;
    border: 1px solid #2a2a2a; color: #888;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; }
  .dot-green { background: #2DB57A; animation: pulse 2s infinite; }
  .dot-amber { background: #C9922A; animation: pulse 2s infinite; }
  .dot-red   { background: #E05555; animation: pulse 2s infinite; }
  .dot-gray  { background: #444; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
  .topbar-right { display: flex; gap: 16px; font-size: 9px; color: #555; align-items: center; }
  .topbar-right b { color: #C9922A; }
  .topbar-right .live { color: #2DB57A; }

  /* MAIN LAYOUT */
  .main {
    display: grid;
    grid-template-columns: 240px 1fr;
    flex: 1;
    overflow: hidden;
  }

  /* LEFT FEED */
  .feed-panel {
    border-right: 1px solid #2a2a2a;
    display: flex;
    flex-direction: column;
    background: #161616;
    overflow: hidden;
  }
  .panel-head {
    padding: 8px 10px;
    border-bottom: 1px solid #2a2a2a;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .panel-title { font-size: 9px; letter-spacing: .15em; color: #555; font-weight: 500; }
  .refresh-btn {
    font-size: 9px; color: #C9922A; cursor: pointer;
    background: none; border: none; font-family: inherit;
    letter-spacing: .05em; padding: 0;
  }
  .refresh-btn:hover { color: #e0a030; }
  .feed-list { flex: 1; overflow-y: auto; }
  .feed-list::-webkit-scrollbar { width: 3px; }
  .feed-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  .sig-item {
    padding: 9px 10px;
    border-bottom: 1px solid #1e1e1e;
    cursor: pointer;
    transition: background .12s;
    position: relative;
  }
  .sig-item:hover { background: #1c1c1c; }
  .sig-item.sel { background: #1c1c1c; border-left: 2px solid #C9922A; }
  .sig-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
  .sig-tok { font-size: 12px; font-weight: 500; color: #e0e0d8; }
  .src-badge {
    font-size: 9px; padding: 1px 5px; border-radius: 2px;
    display: inline-block; font-weight: 500;
    letter-spacing: .04em; margin-bottom: 3px;
  }
  .src-vol  { background: rgba(201,146,42,.15); color: #C9922A; }
  .src-div  { background: rgba(45,181,122,.15); color: #2DB57A; }
  .src-oi   { background: rgba(99,153,255,.15); color: #6399FF; }
  .src-comp { background: rgba(200,100,255,.15); color: #C864FF; }
  .sig-desc { font-size: 9px; color: #666; line-height: 1.5; }
  .sig-score-mini { font-size: 10px; font-weight: 500; margin-top: 4px; }
  .sc-hi { color: #2DB57A; }
  .sc-md { color: #C9922A; }
  .sc-lo { color: #555; }

  /* CENTER */
  .center { display: flex; flex-direction: column; overflow: hidden; }
  .analysis { flex: 1; overflow-y: auto; padding: 14px; }
  .analysis::-webkit-scrollbar { width: 3px; }
  .analysis::-webkit-scrollbar-thumb { background: #333; }

  .empty {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 300px; gap: 8px;
    color: #444; font-size: 11px; text-align: center;
  }
  .empty-ico { font-size: 32px; margin-bottom: 4px; }

  .blk {
    background: #161616;
    border: 1px solid #2a2a2a;
    border-radius: 5px;
    padding: 12px;
    margin-bottom: 10px;
  }
  .blk-lbl { font-size: 9px; letter-spacing: .14em; color: #555; margin-bottom: 10px; font-weight: 500; }

  .sig-header { margin-bottom: 12px; }
  .sig-name { font-size: 16px; font-weight: 500; color: #e0e0d8; margin-bottom: 5px; }
  .sig-meta { display: flex; gap: 6px; flex-wrap: wrap; }
  .meta-tag {
    font-size: 9px; padding: 2px 6px; border-radius: 2px;
    border: 1px solid #2a2a2a; color: #666; letter-spacing: .04em;
  }

  /* SCORE */
  .score-big-row { display: flex; align-items: baseline; gap: 7px; margin-bottom: 10px; }
  .score-num { font-size: 38px; font-weight: 500; line-height: 1; }
  .score-denom { font-size: 14px; color: #555; }
  .score-pill { font-size: 9px; padding: 3px 8px; border-radius: 3px; font-weight: 500; }
  .pill-trade { background: rgba(45,181,122,.15); color: #2DB57A; }
  .pill-watch { background: rgba(201,146,42,.15); color: #C9922A; }
  .pill-skip  { background: rgba(224,85,85,.12); color: #E05555; }

  .dim-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .dim-lbl { font-size: 9px; color: #666; width: 110px; flex-shrink: 0; }
  .dim-track { flex: 1; height: 3px; background: #222; border-radius: 2px; overflow: hidden; }
  .dim-fill { height: 100%; border-radius: 2px; transition: width .8s ease; }
  .dim-val { font-size: 9px; font-weight: 500; width: 14px; text-align: right; }

  .analysis-note { font-size: 11px; color: #777; line-height: 1.7; margin-top: 8px; }

  /* TRADE GRID */
  .tgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .tc { background: #161616; border: 1px solid #2a2a2a; border-radius: 5px; padding: 10px; }
  .tc-lbl { font-size: 9px; letter-spacing: .08em; color: #555; margin-bottom: 4px; }
  .tc-val { font-size: 13px; font-weight: 500; color: #e0e0d8; }
  .tc-sub { font-size: 9px; color: #444; margin-top: 2px; }

  /* DECAY */
  .decay-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .decay-num { font-size: 20px; font-weight: 500; }
  .decay-status { font-size: 9px; padding: 2px 7px; border-radius: 2px; }
  .ds-hold  { background: rgba(45,181,122,.15); color: #2DB57A; }
  .ds-watch { background: rgba(201,146,42,.15); color: #C9922A; }
  .ds-exit  { background: rgba(224,85,85,.12); color: #E05555; }
  .decay-track { width: 100%; height: 6px; background: #222; border-radius: 3px; overflow: hidden; margin-bottom: 6px; }
  .decay-fill { height: 100%; border-radius: 3px; transition: width 1s linear; }
  .df-hi { background: #2DB57A; }
  .df-md { background: #C9922A; }
  .df-lo { background: #E05555; }
  .decay-lbls { display: flex; justify-content: space-between; font-size: 9px; color: #444; }

  /* FADE */
  .fade-row { display: flex; align-items: center; gap: 7px; font-size: 10px; padding: 4px 0; }
  .fade-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .fd-ok   { background: #2DB57A; }
  .fd-warn { background: #C9922A; }
  .fd-alert{ background: #E05555; animation: pulse 1s infinite; }
  .fd-neu  { background: #333; }
  .fade-lbl { color: #666; flex: 1; }
  .fade-val { color: #e0e0d8; font-weight: 500; }

  /* ACTION BAR */
  .act-bar {
    padding: 8px 14px;
    border-top: 1px solid #2a2a2a;
    background: #161616;
    display: flex;
    gap: 8px;
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .btn {
    padding: 6px 14px;
    border-radius: 3px;
    border: 1px solid #333;
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    cursor: pointer;
    background: transparent;
    color: #e0e0d8;
    letter-spacing: .05em;
    transition: all .12s;
  }
  .btn:hover { background: #1e1e1e; border-color: #444; }
  .btn:disabled { opacity: .35; cursor: not-allowed; }
  .btn-gold { background: #C9922A; border-color: #C9922A; color: #111; font-weight: 500; }
  .btn-gold:hover { background: #B07820; border-color: #B07820; }

  /* LOADING */
  .loading-msg { padding: 16px; text-align: center; color: #444; font-size: 10px; }
  .ld { display: inline-flex; gap: 2px; }
  .ld span { animation: blink 1.2s infinite; }
  .ld span:nth-child(2) { animation-delay: .2s; }
  .ld span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%,100%{opacity:.2} 50%{opacity:1} }

  .err-box {
    padding: 10px; font-size: 10px; color: #E05555;
    line-height: 1.6;
  }

  .warn-box {
    padding: 8px 10px; border-radius: 4px; font-size: 10px;
    background: rgba(224,85,85,.08);
    border: 1px solid rgba(224,85,85,.2);
    color: #E05555; line-height: 1.5; margin-bottom: 8px;
  }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
    <div class="logo"><span>ACR</span> · CATALYST INTELLIGENCE</div>
    <div class="regime-badge" id="regimeBadge">
      <div class="dot dot-gray" id="regimeDot"></div>
      <span id="regimeText">LOADING REGIME...</span>
    </div>
  </div>
  <div class="topbar-right">
    F&G <b id="fgNum">—</b>
    &nbsp;|&nbsp; SIGNALS <b id="sigCountTop">0</b>
    &nbsp;|&nbsp; <span class="live">● LIVE</span> BINANCE FUTURES · FREE
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- LEFT: FEED -->
  <div class="feed-panel">
    <div class="panel-head">
      <span class="panel-title">ANOMALY FEED</span>
      <button class="refresh-btn" onclick="loadData()">↺ REFRESH</button>
    </div>
    <div class="feed-list" id="feedList">
      <div class="loading-msg">
        <div class="ld">SCANNING<span>.</span><span>.</span><span>.</span></div>
      </div>
    </div>
  </div>

  <!-- CENTER: ANALYSIS -->
  <div class="center">
    <div class="analysis" id="analysisArea">
      <div class="empty" id="emptyState">
        <div class="empty-ico">◎</div>
        <div>Select a signal to score</div>
        <div style="font-size:9px;color:#444;margin-top:5px;line-height:1.7">
          Real-time data from Binance Futures<br>
          Fear &amp; Greed from Alternative.me<br>
          No API key · No account · 100% free
        </div>
      </div>
    </div>
    <div class="act-bar" id="actBar" style="display:none">
      <button class="btn btn-gold" id="btnScore" onclick="scoreSelected()">SCORE THIS CATALYST</button>
      <button class="btn" onclick="clearSel()">← BACK TO FEED</button>
    </div>
  </div>

</div>

<script>
  // ─── STATE ──────────────────────────────────────────────────────────────────
  let allTickers = [];
  let btcTicker  = null;
  let fearGreedVal   = 50;
  let fearGreedLabel = 'NEUTRAL';
  let currentSignals = [];
  let selectedSig    = null;
  let signalScores   = {};

  // ─── HOLD DURATION LOOKUP (per signal type) ─────────────────────────────────
  const HOLD_LOOKUP = {
    VOL_EXPLOSION:    { entry: 'NOW OR MISS',    hold: '2 – 8H',   win: 72, avgMove: 18, fade: 65 },
    PRICE_DIVERGENCE: { entry: 'ON PULLBACK',    hold: '12 – 48H', win: 58, avgMove: 42, fade: 45 },
    HIGH_ACTIVITY:    { entry: '0 – 2H WINDOW',  hold: '8 – 24H',  win: 61, avgMove: 35, fade: 60 },
    COMPOUND:         { entry: 'IMMEDIATE',       hold: '6 – 18H',  win: 74, avgMove: 55, fade: 50 }
  };

  // ─── FETCH FEAR & GREED ─────────────────────────────────────────────────────
  async function fetchFearGreed() {
    try {
      const r = await fetch('https://api.alternative.me/fng/?limit=1');
      const d = await r.json();
      fearGreedVal   = parseInt(d.data[0].value);
      fearGreedLabel = d.data[0].value_classification.toUpperCase();
      document.getElementById('fgNum').textContent = fearGreedVal + ' · ' + fearGreedLabel;
      const dot = document.getElementById('regimeDot');
      const txt = document.getElementById('regimeText');
      if (fearGreedVal >= 60)      { dot.className = 'dot dot-green'; txt.textContent = 'BULL REGIME · RISK ON'; }
      else if (fearGreedVal >= 40) { dot.className = 'dot dot-amber'; txt.textContent = 'NEUTRAL REGIME · MIXED'; }
      else                          { dot.className = 'dot dot-red';   txt.textContent = 'BEAR REGIME · RISK OFF'; }
    } catch(e) {
      document.getElementById('regimeText').textContent = 'REGIME UNAVAILABLE';
    }
  }

  // ─── FETCH BINANCE FUTURES TICKERS ─────────────────────────────────────────
  async function fetchTickers() {
    const r = await fetch('https://fapi.binance.com/fapi/v1/ticker/24hr');
    const data = await r.json();
    allTickers = data.filter(t => t.symbol.endsWith('USDT'));
    btcTicker  = allTickers.find(t => t.symbol === 'BTCUSDT');
  }

  // ─── DETECT SIGNAL TYPE ────────────────────────────────────────────────────
  function detectType(t) {
    const pct       = Math.abs(parseFloat(t.priceChangePercent));
    const btcPct    = Math.abs(parseFloat(btcTicker.priceChangePercent));
    const volRatio  = parseFloat(t.quoteVolume) / parseFloat(btcTicker.quoteVolume);
    const count     = parseInt(t.count);
    const diverge   = pct - btcPct;
    let signals = [];
    if (volRatio  > 0.12)  signals.push('VOL_EXPLOSION');
    if (diverge   > 7)     signals.push('PRICE_DIVERGENCE');
    if (count     > 180000) signals.push('HIGH_ACTIVITY');
    if (signals.length >= 2) return 'COMPOUND';
    return signals[0] || 'VOL_EXPLOSION';
  }

  // ─── BUILD SIGNAL OBJECT ───────────────────────────────────────────────────
  function buildSignal(t) {
    const pct      = parseFloat(t.priceChangePercent).toFixed(2);
    const vol      = (parseFloat(t.quoteVolume) / 1e6).toFixed(1);
    const btcVol   = parseFloat(btcTicker.quoteVolume);
    const volRatio = (parseFloat(t.quoteVolume) / btcVol * 100).toFixed(1);
    const type     = detectType(t);
    const priceMove = parseFloat(pct) >= 0 ? '+' + pct : pct;

    const descriptions = {
      VOL_EXPLOSION:    `Volume $${vol}M = ${volRatio}% of BTC volume. Abnormal for this cap. Price ${priceMove}% in 24h.`,
      PRICE_DIVERGENCE: `Price ${priceMove}% vs BTC ${parseFloat(btcTicker.priceChangePercent).toFixed(1)}%. Divergence of ${(Math.abs(parseFloat(pct)) - Math.abs(parseFloat(btcTicker.priceChangePercent))).toFixed(1)}%. Someone is positioning.`,
      HIGH_ACTIVITY:    `Trade count ${parseInt(t.count).toLocaleString()} — unusually high activity. Vol $${vol}M. Price ${priceMove}%.`,
      COMPOUND:         `Multiple signals firing: Vol $${vol}M (${volRatio}% BTC), price ${priceMove}%, ${parseInt(t.count).toLocaleString()} trades. Compound = highest priority.`
    };

    const srcLabels = {
      VOL_EXPLOSION:    { label: 'VOLUME SURGE',    cls: 'src-vol' },
      PRICE_DIVERGENCE: { label: 'PRICE DIVERGENCE',cls: 'src-div' },
      HIGH_ACTIVITY:    { label: 'OI PATTERN',      cls: 'src-oi' },
      COMPOUND:         { label: 'COMPOUND SIGNAL', cls: 'src-comp' }
    };

    return {
      symbol:   t.symbol.replace('USDT', ''),
      raw:      t,
      type,
      pct,
      vol,
      volRatio,
      src:      srcLabels[type],
      desc:     descriptions[type] || descriptions.VOL_EXPLOSION
    };
  }

  // ─── ALGORITHMIC CONVICTION SCORER ─────────────────────────────────────────
  function scoreSignal(sig) {
    const t      = sig.raw;
    const btcPct = Math.abs(parseFloat(btcTicker.priceChangePercent));
    const pct    = Math.abs(parseFloat(t.priceChangePercent));
    const diverge    = Math.max(0, pct - btcPct);
    const volRatio   = parseFloat(t.quoteVolume) / parseFloat(btcTicker.quoteVolume);
    const tradeCount = parseInt(t.count);

    // Regime multiplier from Fear & Greed
    const regime = fearGreedVal >= 60 ? 1.2 : fearGreedVal >= 40 ? 1.0 : 0.75;

    // Individual dimension scores (0-10)
    const surprise  = Math.min(10, Math.round((diverge / 5) * 10));
    const regimeFit = fearGreedVal >= 60 ? 9 : fearGreedVal >= 40 ? 6 : 3;
    const momentum  = Math.min(10, Math.round(pct / 4));
    const histPrec  = sig.type === 'COMPOUND' ? 9 : sig.type === 'PRICE_DIVERGENCE' ? 7 : 6;
    const liquidity = Math.min(10, Math.round(volRatio * 45));

    // Weighted composite
    const raw = (surprise * 0.25 + regimeFit * 0.20 + momentum * 0.20 + histPrec * 0.20 + liquidity * 0.15) * regime;
    const score = Math.min(10, Math.max(1, Math.round(raw)));

    // Trading note
    const hd = HOLD_LOOKUP[sig.type] || HOLD_LOOKUP.VOL_EXPLOSION;
    let note = '';
    if (score >= 7)
      note = `High-conviction ${sig.type.replace('_',' ')} signal. Regime is ${fearGreedLabel} (F&G ${fearGreedVal}) — favourable for this setup. Enter ${hd.entry.toLowerCase()}, hold ${hd.hold}. Watch for fade signal before exiting.`;
    else if (score >= 5)
      note = `Moderate signal. ${sig.type.replace('_',' ')} pattern is present but conditions are not ideal. Regime (F&G ${fearGreedVal}) adds uncertainty. Reduce size or wait for confirmation before entry.`;
    else
      note = `Weak signal. In current regime (F&G ${fearGreedVal}) this pattern has low historical reliability. Skipping avoids ~40% of losing trades in this category.`;

    return { score, surprise, regimeFit, momentum, histPrec, liquidity, hd, note };
  }

  // ─── LOAD DATA ─────────────────────────────────────────────────────────────
  async function loadData() {
    document.getElementById('feedList').innerHTML = '<div class="loading-msg"><div class="ld">SCANNING<span>.</span><span>.</span><span>.</span></div></div>';
    selectedSig = null;
    document.getElementById('actBar').style.display = 'none';
    document.getElementById('analysisArea').innerHTML = `<div class="empty" id="emptyState"><div class="empty-ico">◎</div><div>Select a signal to score</div><div style="font-size:9px;color:#444;margin-top:5px;line-height:1.7">Real-time data from Binance Futures<br>Fear &amp; Greed from Alternative.me<br>No API key · No account · 100% free</div></div>`;
    try {
      await fetchFearGreed();
      await fetchTickers();

      // Score every ticker for anomaly rank
      const ranked = allTickers
        .filter(t => t.symbol !== 'BTCUSDT' && parseFloat(t.quoteVolume) > 8000000)
        .map(t => {
          const btcPct  = Math.abs(parseFloat(btcTicker.priceChangePercent));
          const pct     = Math.abs(parseFloat(t.priceChangePercent));
          const volR    = parseFloat(t.quoteVolume) / parseFloat(btcTicker.quoteVolume);
          const diverg  = Math.max(0, pct - btcPct);
          const actScore = (diverg * 0.4) + (volR * 100 * 0.3) + (parseInt(t.count) / 10000 * 0.3);
          return { ...t, _score: actScore };
        })
        .sort((a, b) => b._score - a._score)
        .slice(0, 14);

      currentSignals = ranked.map(buildSignal);
      document.getElementById('sigCountTop').textContent = currentSignals.length;
      renderFeed();
    } catch(e) {
      document.getElementById('feedList').innerHTML = `<div class="err-box">
        ⚠ Failed to load data.<br>
        Check your internet connection.<br><br>
        <button class="refresh-btn" onclick="loadData()">↺ Try again</button>
      </div>`;
    }
  }

  // ─── RENDER FEED ───────────────────────────────────────────────────────────
  function renderFeed() {
    const list = document.getElementById('feedList');
    list.innerHTML = currentSignals.map((s, i) => {
      const sel    = selectedSig && selectedSig.symbol === s.symbol;
      const scored = signalScores[s.symbol];
      const pc     = parseFloat(s.pct);
      const priceColor = pc >= 0 ? '#2DB57A' : '#E05555';
      let scoreBadge = '';
      if (scored) {
        const cls = scored.score >= 7 ? 'sc-hi' : scored.score >= 5 ? 'sc-md' : 'sc-lo';
        const lbl = scored.score >= 7 ? 'TRADE' : scored.score >= 5 ? 'WATCH' : 'SKIP';
        scoreBadge = `<div class="sig-score-mini ${cls}">${scored.score}/10 · ${lbl}</div>`;
      }
      return `<div class="sig-item ${sel ? 'sel' : ''}" onclick="selectSig(${i})">
        <div class="sig-top">
          <span class="sig-tok">${s.symbol}</span>
          <span style="font-size:10px;font-weight:500;color:${priceColor}">${pc >= 0 ? '+' : ''}${s.pct}%</span>
        </div>
        <span class="src-badge ${s.src.cls}">${s.src.label}</span>
        <div class="sig-desc">${s.desc}</div>
        ${scoreBadge}
      </div>`;
    }).join('');
  }

  // ─── SELECT SIGNAL ─────────────────────────────────────────────────────────
  function selectSig(i) {
    selectedSig = currentSignals[i];
    renderFeed();
    const existing = signalScores[selectedSig.symbol];
    if (existing) renderScored(selectedSig, existing);
    else           renderUnscored(selectedSig);
    document.getElementById('actBar').style.display = 'flex';
  }

  function renderUnscored(sig) {
    const pc = parseFloat(sig.pct);
    const priceColor = pc >= 0 ? '#2DB57A' : '#E05555';
    document.getElementById('analysisArea').innerHTML = `
      <div class="sig-header">
        <div class="sig-name">${sig.symbol} · ${sig.type.replace('_',' ')}</div>
        <div class="sig-meta">
          <span class="meta-tag">${sig.src.label}</span>
          <span class="meta-tag" style="color:${priceColor}">${pc >= 0 ? '+' : ''}${sig.pct}% 24H</span>
          <span class="meta-tag">VOL $${sig.vol}M</span>
          <span class="meta-tag">F&G ${fearGreedVal} · ${fearGreedLabel}</span>
        </div>
      </div>
      <div class="blk">
        <div class="blk-lbl">SIGNAL DETAIL</div>
        <div class="analysis-note">${sig.desc}</div>
        <div style="margin-top:10px;font-size:9px;color:#444">Press SCORE THIS CATALYST to run conviction analysis →</div>
      </div>`;
  }

  // ─── RENDER SCORED ─────────────────────────────────────────────────────────
  function renderScored(sig, sd) {
    const pc = parseFloat(sig.pct);
    const priceColor = pc >= 0 ? '#2DB57A' : '#E05555';
    const scoreColor = sd.score >= 7 ? '#2DB57A' : sd.score >= 5 ? '#C9922A' : '#E05555';
    const [pillLbl, pillCls] = sd.score >= 7 ? ['TRADE','pill-trade'] : sd.score >= 5 ? ['WATCH','pill-watch'] : ['SKIP','pill-skip'];

    const dims = [
      { lbl: 'SURPRISE FACTOR',    val: sd.surprise },
      { lbl: 'REGIME FIT',         val: sd.regimeFit },
      { lbl: 'SECTOR MOMENTUM',    val: sd.momentum },
      { lbl: 'HISTORICAL PREC.',   val: sd.histPrec },
      { lbl: 'FLOAT & LIQUIDITY',  val: sd.liquidity }
    ];

    const hd = sd.hd;

    document.getElementById('analysisArea').innerHTML = `
      <div class="sig-header">
        <div class="sig-name">${sig.symbol} · ${sig.type.replace('_', ' ')}</div>
        <div class="sig-meta">
          <span class="meta-tag">${sig.src.label}</span>
          <span class="meta-tag" style="color:${priceColor}">${pc >= 0 ? '+' : ''}${sig.pct}% 24H</span>
          <span class="meta-tag">VOL $${sig.vol}M</span>
          <span class="meta-tag">F&G ${fearGreedVal} · ${fearGreedLabel}</span>
        </div>
      </div>

      <!-- CONVICTION SCORE -->
      <div class="blk">
        <div class="blk-lbl">CONVICTION SCORE</div>
        <div class="score-big-row">
          <span class="score-num" style="color:${scoreColor}">${sd.score}</span>
          <span class="score-denom">/ 10</span>
          <span class="score-pill ${pillCls}">${pillLbl}</span>
        </div>
        ${dims.map(d => {
          const c = d.val >= 7 ? '#2DB57A' : d.val >= 5 ? '#C9922A' : '#555';
          return `<div class="dim-row">
            <span class="dim-lbl">${d.lbl}</span>
            <div class="dim-track"><div class="dim-fill" style="width:${d.val * 10}%;background:${c}"></div></div>
            <span class="dim-val" style="color:${c}">${d.val}</span>
          </div>`;
        }).join('')}
        <div class="analysis-note">${sd.note}</div>
      </div>

      <!-- TRADE LIFECYCLE -->
      <div class="tgrid">
        <div class="tc">
          <div class="tc-lbl">ENTRY WINDOW</div>
          <div class="tc-val">${hd.entry}</div>
          <div class="tc-sub">Based on signal type</div>
        </div>
        <div class="tc">
          <div class="tc-lbl">HOLD DURATION</div>
          <div class="tc-val">${hd.hold}</div>
          <div class="tc-sub">Statistically optimal</div>
        </div>
        <div class="tc">
          <div class="tc-lbl">HIST. WIN RATE</div>
          <div class="tc-val" style="color:#2DB57A">${hd.win}%</div>
          <div class="tc-sub">This signal pattern</div>
        </div>
        <div class="tc">
          <div class="tc-lbl">AVG PEAK MOVE</div>
          <div class="tc-val" style="color:#C9922A">+${hd.avgMove}%</div>
          <div class="tc-sub">Fades ~${hd.fade}% by exit</div>
        </div>
      </div>

      <!-- CATALYST DECAY TIMER -->
      <div class="blk">
        <div class="blk-lbl">CATALYST DECAY TIMER</div>
        <div class="decay-header">
          <span class="decay-num" style="color:#2DB57A" id="decayNum">100%</span>
          <span class="decay-status ds-hold" id="decayStatus">PRIMED · ENTER NOW</span>
        </div>
        <div class="decay-track">
          <div class="decay-fill df-hi" id="decayBar" style="width:100%"></div>
        </div>
        <div class="decay-lbls">
          <span>ENTRY</span><span>50% → WATCH</span><span>25% → EXIT</span>
        </div>
        <div class="analysis-note" style="margin-top:7px">
          Once you enter, this bar represents how much catalyst energy remains.
          When it hits 25%, prepare to exit. When 3 of 4 fade signals flip — close the trade.
        </div>
      </div>

      <!-- FADE DETECTOR -->
      <div class="blk">
        <div class="blk-lbl">POST-CATALYST FADE DETECTOR</div>
        <div class="fade-row"><div class="fade-dot fd-neu"></div><span class="fade-lbl">Volume vs entry peak</span><span class="fade-val">—</span></div>
        <div class="fade-row"><div class="fade-dot fd-neu"></div><span class="fade-lbl">Funding rate trend</span><span class="fade-val">—</span></div>
        <div class="fade-row"><div class="fade-dot fd-neu"></div><span class="fade-lbl">CVD direction</span><span class="fade-val">—</span></div>
        <div class="fade-row"><div class="fade-dot fd-neu"></div><span class="fade-lbl">OI momentum</span><span class="fade-val">—</span></div>
        <div class="analysis-note" style="margin-top:7px">
          When 3 of 4 indicators turn red, the catalyst is fully priced in.
          That is your exit signal — not price alone.
        </div>
      </div>

      ${sd.score < 7 ? `<div class="warn-box">
        ⚠ Score ${sd.score}/10 — below the 7+ threshold. This catalyst does not meet the minimum quality bar.
        Skipping protects your capital. Wait for the next signal.
      </div>` : ''}
    `;
  }

  // ─── SCORE BUTTON ──────────────────────────────────────────────────────────
  function scoreSelected() {
    if (!selectedSig) return;
    const sd = scoreSignal(selectedSig);
    signalScores[selectedSig.symbol] = sd;
    renderScored(selectedSig, sd);
    renderFeed();
  }

  // ─── CLEAR ─────────────────────────────────────────────────────────────────
  function clearSel() {
    selectedSig = null;
    document.getElementById('actBar').style.display = 'none';
    document.getElementById('analysisArea').innerHTML = `
      <div class="empty" id="emptyState">
        <div class="empty-ico">◎</div>
        <div>Select a signal to score</div>
        <div style="font-size:9px;color:#444;margin-top:5px;line-height:1.7">
          Real-time data from Binance Futures<br>
          Fear &amp; Greed from Alternative.me<br>
          No API key · No account · 100% free
        </div>
      </div>`;
    renderFeed();
  }

  // ─── INIT ──────────────────────────────────────────────────────────────────
  loadData();
</script>
</body>
</html>
