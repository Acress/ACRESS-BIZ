<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Kariolas · Family Finance Hub</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{--g:#1a7a45;--g1:#dcf5e7;--g2:#155e35;--r:#c0392b;--r1:#fdecea;--a:#b07d1e;--a1:#fef3dc;--b:#1a5fa8;--b1:#e8f0fb;--pu:#6c3fc5;--pu1:#f0ebff;--bg:#f4f3ef;--surf:#fff;--surf2:#f9f8f5;--surf3:#f0efe8;--bdr:rgba(0,0,0,.08);--bdr2:rgba(0,0,0,.14);--tx:#1a1a18;--tx2:#5c5c58;--tx3:#9a9a94;--rad:12px;--rad-s:8px;--sh:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04)}
@media(prefers-color-scheme:dark){:root{--bg:#0f0f0e;--surf:#1c1c1a;--surf2:#242422;--surf3:#2a2a28;--bdr:rgba(255,255,255,.08);--bdr2:rgba(255,255,255,.14);--tx:#f0efe8;--tx2:#9a9a94;--tx3:#5c5c58;--g1:#0d3320;--r1:#3a1414;--a1:#2e2008;--b1:#0d1f3a;--pu1:#1e1238}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.5;min-height:100vh}
.shell{display:grid;grid-template-columns:235px 1fr;min-height:100vh}
aside{background:var(--surf);border-right:1px solid var(--bdr);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.brand{padding:20px 18px 16px;border-bottom:1px solid var(--bdr)}
.brand h1{font-family:'DM Serif Display',serif;font-size:17px;font-weight:400}
.brand small{font-size:10px;color:var(--tx3);display:block;margin-top:2px}
nav{padding:10px 8px;flex:1;overflow-y:auto}
.ni{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:var(--rad-s);cursor:pointer;font-size:13px;color:var(--tx2);font-weight:500;transition:all .15s;border:none;background:none;width:100%;text-align:left;position:relative}
.ni:hover{background:var(--surf2);color:var(--tx)}.ni.on{background:var(--g1);color:var(--g2)}.ni .ico{width:17px;text-align:center;flex-shrink:0;font-size:14px}
.badge-dot{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:7px;height:7px;border-radius:50%;background:var(--r)}
.nav-sep{font-size:9px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.8px;padding:12px 11px 4px}
.sfooter{padding:12px 16px;border-top:1px solid var(--bdr);font-size:11px;color:var(--tx3);display:flex;align-items:center;gap:6px}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--tx3);flex-shrink:0}.sdot.on{background:var(--g)}
main{padding:28px 32px;min-height:100vh}
.ph{margin-bottom:22px;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px}
.ph-left h2{font-size:21px;font-weight:700;letter-spacing:-.3px}.ph-left p{font-size:13px;color:var(--tx2);margin-top:4px}
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:10px;margin-bottom:20px}
.sc{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rad);padding:14px;box-shadow:var(--sh)}
.sc .l{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.sc .v{font-size:20px;font-weight:700}.sc .s{font-size:10px;color:var(--tx3);margin-top:3px}
.sec{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rad);padding:18px;margin-bottom:16px;box-shadow:var(--sh)}
.stt{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.stt span{font-weight:400;text-transform:none;font-size:11px;color:var(--tx3)}
.g{color:var(--g)}.r{color:var(--r)}.a{color:var(--a)}.b{color:var(--b)}.pu{color:var(--pu)}
.bdn{display:inline-block;padding:2px 8px;border-radius:50px;font-size:11px;font-weight:600;white-space:nowrap}
.bg{background:var(--g1);color:var(--g2)}.br{background:var(--r1);color:var(--r)}.ba{background:var(--a1);color:var(--a)}.bb{background:var(--b1);color:var(--b)}.bpu{background:var(--pu1);color:var(--pu)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.4px;padding:7px 10px;text-align:left;border-bottom:1px solid var(--bdr);white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid var(--bdr);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--surf2)}.tr-total td{font-weight:700;background:var(--surf2)}
input,select,textarea{border:1px solid var(--bdr2);border-radius:var(--rad-s);background:var(--surf);color:var(--tx);font-family:inherit;font-size:13px;padding:7px 10px;width:100%;transition:border-color .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--g);box-shadow:0 0 0 3px rgba(26,122,69,.1)}
input[type=file]{display:none}
.btn{padding:8px 16px;border:1px solid var(--bdr2);background:var(--surf);border-radius:var(--rad-s);cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;color:var(--tx);transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--surf2)}.btn.pri{background:var(--g);color:#fff;border-color:var(--g)}.btn.pri:hover{background:var(--g2)}
.btn.sec{background:var(--b1);color:var(--b);border-color:var(--b)}.btn.warn{background:var(--a1);color:var(--a);border-color:var(--a)}
.btn.dan{background:var(--r1);color:var(--r);border-color:var(--r)}
.btn.sm{padding:5px 11px;font-size:12px}.btn.xs{padding:3px 8px;font-size:11px}.btn:disabled{opacity:.5;cursor:not-allowed}
.fgrid{display:grid;gap:10px}.fgrid.c2{grid-template-columns:1fr 1fr}.fgrid.c3{grid-template-columns:1fr 1fr 1fr}.fc{grid-column:1/-1}
.fl{font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.prog{height:6px;background:var(--bdr);border-radius:3px;overflow:hidden}.pf{height:100%;border-radius:3px;transition:width .4s}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.dz{border:2px dashed var(--bdr2);border-radius:var(--rad);padding:28px;text-align:center;cursor:pointer;transition:all .2s}
.dz:hover,.dz.drag{border-color:var(--g);background:var(--g1)}.dz .dico{font-size:36px;margin-bottom:10px}
.dz h3{font-size:15px;font-weight:600;margin-bottom:6px}.dz p{font-size:12px;color:var(--tx2);line-height:1.6}
.tx-item{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--bdr)}.tx-item:last-child{border-bottom:none}
.tx-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.tx-inf{flex:1;min-width:0}.tx-nm{font-weight:500;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.tx-mt{font-size:11px;color:var(--tx3);margin-top:1px}
.tx-am{font-weight:700;font-size:13px;flex-shrink:0}
.ic-btn{background:none;border:none;cursor:pointer;color:var(--tx3);font-size:13px;padding:3px 6px;border-radius:4px;transition:all .15s}.ic-btn:hover{color:var(--r);background:var(--r1)}
.cat-section{margin-bottom:10px}
.cat-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surf2);border-radius:var(--rad-s);cursor:pointer;border:1px solid var(--bdr);transition:background .15s}
.cat-header:hover{background:var(--surf3)}.cat-header .cat-name{font-weight:600;font-size:13px;display:flex;align-items:center;gap:8px}
.cat-header .cat-stats{display:flex;align-items:center;gap:10px;font-size:12px}
.cat-body{border:1px solid var(--bdr);border-top:none;border-radius:0 0 var(--rad-s) var(--rad-s)}
.insight-item{border-left:3px solid var(--g);padding:10px 14px;margin-bottom:10px;background:var(--surf2);border-radius:0 var(--rad-s) var(--rad-s) 0}
.insight-item.warn{border-color:var(--a)}.insight-item.alert{border-color:var(--r)}.insight-item.info{border-color:var(--b)}
.insight-item h4{font-size:13px;font-weight:600;margin-bottom:3px}.insight-item p{font-size:12px;color:var(--tx2);line-height:1.5}
.chat-wrap{display:flex;flex-direction:column;height:420px}
.chat-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;background:var(--surf2);border-radius:var(--rad-s) var(--rad-s) 0 0;border:1px solid var(--bdr);border-bottom:none}
.msg{max-width:82%;padding:10px 13px;border-radius:12px;font-size:13px;line-height:1.6}
.msg.user{align-self:flex-end;background:var(--g);color:#fff;border-radius:12px 12px 3px 12px}
.msg.ai{align-self:flex-start;background:var(--surf);border:1px solid var(--bdr);border-radius:12px 12px 12px 3px}.msg.ai.thinking{opacity:.6;font-style:italic}
.chat-input-row{display:flex;gap:8px;padding:10px;background:var(--surf);border:1px solid var(--bdr);border-radius:0 0 var(--rad-s) var(--rad-s)}
.chat-input-row input{margin:0}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal{background:var(--surf);border-radius:var(--rad);padding:24px;max-width:700px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.2);max-height:92vh;overflow-y:auto}
.modal h3{font-size:17px;font-weight:700;margin-bottom:6px}.modal .mdesc{font-size:13px;color:var(--tx2);margin-bottom:16px;line-height:1.6}
.pill-row{display:flex;gap:6px;flex-wrap:wrap}
.pill{padding:4px 12px;border-radius:50px;font-size:12px;border:1px solid var(--bdr2);cursor:pointer;background:var(--surf);transition:all .15s}.pill:hover{border-color:var(--g);color:var(--g)}
.empty-state{text-align:center;padding:32px 16px;color:var(--tx3);font-size:13px}
.empty-state .eico{font-size:36px;margin-bottom:10px}
.celebrate{text-align:center;padding:20px;background:var(--g1);border-radius:var(--rad);border:1px solid var(--g);margin-bottom:14px}
.celebrate .trophy{font-size:40px;margin-bottom:8px}
.review-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bdr)}.review-item:last-child{border-bottom:none}
.ri-desc{flex:1;font-size:13px;font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ri-amt{font-weight:700;font-size:13px;color:var(--r);flex-shrink:0;min-width:72px;text-align:right}
.trend-up{color:var(--g)}.trend-dn{color:var(--r)}.trend-fl{color:var(--tx3)}
.month-card{background:var(--surf2);border:1px solid var(--bdr);border-radius:var(--rad-s);padding:14px}
.month-card.closed{border-color:var(--g);background:var(--g1)}
.year-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bdr);font-size:13px}.year-row:last-child{border-bottom:none}
@media(max-width:720px){.shell{grid-template-columns:1fr}aside{position:static;height:auto;border-right:none;border-bottom:1px solid var(--bdr)}.brand{border-bottom:none}nav{display:flex;flex-wrap:wrap;padding:6px}.ni{padding:6px 9px;font-size:12px}.sfooter{display:none}main{padding:16px}.grid2{grid-template-columns:1fr}.fgrid.c2,.fgrid.c3{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="shell">
  <aside>
    <div class="brand">
      <h1>The Kariolas</h1>
      <small>Family Finance Hub · <span id="cur-yr">2026</span></small>
    </div>
    <nav id="nav"></nav>
    <div class="sfooter"><div class="sdot" id="sdot"></div><span id="slbl">Ready</span></div>
  </aside>
  <main id="main"></main>
</div>

<!-- Review Modal -->
<div class="modal-bg" id="rev-modal" style="display:none">
  <div class="modal">
    <h3>📋 Review Imported Transactions</h3>
    <p class="mdesc" id="rev-summary"></p>
    <div id="rev-flags"></div>
    <div id="rev-list" style="max-height:360px;overflow-y:auto;border:1px solid var(--bdr);border-radius:var(--rad-s);padding:8px 12px;margin-bottom:14px"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap">
      <button class="btn" onclick="closeRev()">Cancel</button>
      <button class="btn pri" onclick="confirmImport()">✅ Confirm &amp; Save</button>
    </div>
  </div>
</div>

<!-- Close Month Modal -->
<div class="modal-bg" id="cm-modal" style="display:none">
  <div class="modal" style="max-width:480px">
    <h3>📅 Close Month</h3>
    <p class="mdesc">Freeze <strong id="cm-lbl"></strong> as a permanent snapshot. You can still add transactions after — the snapshot won't change.</p>
    <div id="cm-body" style="background:var(--surf2);border-radius:var(--rad-s);padding:14px;margin-bottom:16px;font-size:13px;line-height:2.1"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" onclick="document.getElementById('cm-modal').style.display='none'">Cancel</button>
      <button class="btn pri" onclick="confirmCloseMonth()">Close Month &amp; Save Snapshot</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════ SEED DATA ═══════════════════════════
const BUDGET_SEED=[{cat:"Tithes",budget:670,group:"Giving"},{cat:"House Rent",budget:1000,group:"Housing"},{cat:"Groceries",budget:593,group:"Food"},{cat:"Personal/Stipend",budget:370,group:"Family"},{cat:"Auto Loan",budget:750,group:"Debt"},{cat:"Best Buy Loan",budget:300,group:"Debt"},{cat:"Auto Insurance",budget:133,group:"Transport"},{cat:"Electricity",budget:60,group:"Utilities"},{cat:"Home Wifi",budget:40,group:"Utilities"},{cat:"Mobile Sub",budget:25,group:"Utilities"},{cat:"iCloud/Google",budget:10,group:"Utilities"},{cat:"Car Wash",budget:21,group:"Transport"},{cat:"ChatGPT",budget:20,group:"Subscriptions"},{cat:"Car Maintenance",budget:50,group:"Transport"},{cat:"Gas",budget:460,group:"Transport"},{cat:"Tax",budget:100,group:"Tax"},{cat:"Day Care",budget:427.08,group:"Family"}];
const DEBTS_SEED=[{id:"hyundai",name:"Hyundai (Auto Loan)",balance:48000,monthly:750,color:"#c0392b"},{id:"bestbuy",name:"Best Buy",balance:1734,monthly:300,color:"#e67e22"},{id:"citi",name:"CitiBank",balance:446,monthly:0,color:"#2980b9"},{id:"chasekk",name:"Chase (KK)",balance:1500,monthly:0,color:"#8e44ad"},{id:"chasemj",name:"Chase (MJ)",balance:900,monthly:0,color:"#16a085"}];
const SINKING_SEED=[{id:"health",name:"MJ Health Insurance",target:600},{id:"lsat",name:"LSAT",target:700},{id:"eb2",name:"EB2 Immigration",target:10000},{id:"opt",name:"OPT",target:500},{id:"misc",name:"Miscellaneous",target:6000},{id:"florida",name:"Florida Trip",target:1200},{id:"taxret",name:"Tax Return (owed)",target:1400},{id:"asylum",name:"Asylum",target:10000}];
const MONTHLY_INCOME=7043, MONTHLY_BUDGET=5029.08, MONTHLY_SURPLUS=2013.92;
const GICO={Giving:"🙏",Housing:"🏠",Food:"🛒",Family:"👨‍👩‍👧",Debt:"💳",Transport:"🚗",Utilities:"💡",Subscriptions:"📱",Tax:"📋",Income:"💰",Uncategorized:"❓",Other:"📌"};
const GCOL={Giving:"#8e44ad",Housing:"#1a5fa8",Food:"#e67e22",Family:"#e74c3c",Debt:"#c0392b",Transport:"#16a085",Utilities:"#2980b9",Subscriptions:"#7f8c8d",Tax:"#95a5a6",Income:"#1a7a45",Uncategorized:"#b07d1e",Other:"#7f8c8d"};
const KW=[
  {kw:["WALMART","KROGER","ALDI","WHOLE FOODS","TRADER JOE","PUBLIX","SAFEWAY","HEB","COSTCO","FOOD LION","GROCERY","SUPERMARKET"],cat:"Groceries",group:"Food"},
  {kw:["SHELL","EXXON","CHEVRON","BP ","MOBIL","MARATHON","SUNOCO","VALERO","SPEEDWAY","CIRCLE K","WAWA","GAS STATION"],cat:"Gas",group:"Transport"},
  {kw:["CHATGPT","OPENAI"],cat:"ChatGPT",group:"Subscriptions"},
  {kw:["ICLOUD","GOOGLE ONE","GOOGLE STORAGE"],cat:"iCloud/Google",group:"Subscriptions"},
  {kw:["NETFLIX","HULU","DISNEY+","HBO","APPLE TV","YOUTUBE PREMIUM","PARAMOUNT","PEACOCK"],cat:"Subscriptions",group:"Subscriptions"},
  {kw:["CHURCH","TITHE","OFFERING","CHARITY","ST ","SAINT ","CATHEDRAL","MINISTRY","DONATION","TEMPLE","MOSQUE"],cat:"Tithes",group:"Giving"},
  {kw:["GEICO","STATE FARM","ALLSTATE","PROGRESSIVE","LIBERTY MUTUAL","AUTO INSURANCE"],cat:"Auto Insurance",group:"Transport"},
  {kw:["ELECTRIC","DUKE ENERGY","GEORGIA POWER","DOMINION","PECO","CON ED","EVERSOURCE"],cat:"Electricity",group:"Utilities"},
  {kw:["COMCAST","XFINITY","SPECTRUM","AT&T INTERNET","VERIZON FIOS","COX COMM","INTERNET"],cat:"Home Wifi",group:"Utilities"},
  {kw:["T-MOBILE","VERIZON WIRELESS","AT&T MOBILITY","CRICKET","METRO PCS","BOOST MOBILE"],cat:"Mobile Sub",group:"Utilities"},
  {kw:["RENT","APARTMENT","PROPERTY MGMT","RENTAL PAYMENT"],cat:"House Rent",group:"Housing"},
  {kw:["DAYCARE","DAY CARE","CHILDCARE","PRESCHOOL","KINDERCARE"],cat:"Day Care",group:"Family"},
  {kw:["CAR WASH","CARWASH","AUTO WASH"],cat:"Car Wash",group:"Transport"},
  {kw:["JIFFY LUBE","OIL CHANGE","AUTOZONE","O'REILLY","NAPA AUTO","FIRESTONE","MIDAS","PEP BOYS","TIRE"],cat:"Car Maintenance",group:"Transport"},
  {kw:["PAYROLL","DIRECT DEPOSIT","SALARY","PAYCHECK","WAGES"],cat:"Income",group:"Income"},
  {kw:["IRS","TAX PAYMENT","H&R BLOCK","TURBOTAX"],cat:"Tax",group:"Tax"},
  {kw:["BEST BUY"],cat:"Best Buy Loan",group:"Debt"},
  {kw:["TRAFFIC","PARKING VIOLATION","CITATION","FINE ","PENALTY"],cat:"Uncategorized",group:"Uncategorized",flag:"Traffic/fine — not in budget"},
];
function quickCat(desc){const U=desc.toUpperCase();for(const r of KW){for(const k of r.kw){if(U.includes(k))return{cat:r.cat,group:r.group,flag:r.flag||null};}}return{cat:"Uncategorized",group:"Uncategorized",flag:null};}

// ═══════════════════════════════════════ STATE ═══════════════════════════════
const SK='kariola_v4';
let S={
  tab:'dashboard', apiKey:'', currentYear:2026,
  budgetItems: JSON.parse(JSON.stringify(BUDGET_SEED)),
  customItems: [],
  debts: JSON.parse(JSON.stringify(DEBTS_SEED)),
  archivedDebts: [],
  sinking: JSON.parse(JSON.stringify(SINKING_SEED)).map(i=>({...i,saved:0})),
  completedSinking: [],
  transactions: [],
  debtExtras: {},
  budgetHistory: {},
  closedMonths: [],
  archivedYears: [],
  dismissedInsights: [],
  chatHistory: [],
};
DEBTS_SEED.forEach(d=>S.debtExtras[d.id]=0);

let pendingImport=[], pendingCloseMonth=null, cachedInsights=null, saveTimer;

function save(){
  clearTimeout(saveTimer);
  setSave('saving');
  saveTimer=setTimeout(()=>{
    try{localStorage.setItem(SK,JSON.stringify(S));setSave('saved');}
    catch(e){setSave('error');}
  },600);
}

function load(){
  try{
    const raw=localStorage.getItem(SK);
    if(raw){
      const d=JSON.parse(raw);
      Object.keys(S).forEach(k=>{if(d[k]!==undefined)S[k]=d[k];});
    }
    setSave('saved');
  }catch(e){setSave('new');}
}

function setSave(s){
  const dot=document.getElementById('sdot'),lbl=document.getElementById('slbl');
  if(!dot||!lbl)return;
  if(s==='saving'){dot.className='sdot';lbl.textContent='Saving…';}
  else if(s==='saved'){dot.className='sdot on';lbl.textContent='All changes saved';}
  else if(s==='new'){dot.className='sdot on';lbl.textContent='Ready';}
  else{dot.className='sdot';lbl.textContent='Save failed';}
}

// ═══════════════════════════════════════ HELPERS ═════════════════════════════
function fmt(v,d=2){return'$'+Math.abs(v).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});}
function fmtI(v){return'$'+Math.round(Math.abs(v)).toLocaleString();}
function devLbl(d){if(Math.abs(d)<0.5)return'On budget';return(d>0?'+':'')+fmt(d)+(d>0?' over':' under');}
function allItems(){return[...S.budgetItems,...S.customItems];}
function curMonthKey(){const n=new Date();return`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`;}
function monthLabel(key){const[y,m]=key.split('-');return new Date(parseInt(y),parseInt(m)-1).toLocaleString('en-US',{month:'short',year:'numeric'});}
function trendArrow(cur,prev){if(!prev||prev===0)return'';const p=(cur-prev)/Math.abs(prev)*100;if(p>5)return'<span class="trend-dn">↑</span>';if(p<-5)return'<span class="trend-up">↓</span>';return'<span class="trend-fl">→</span>';}
function txActual(cat){return S.transactions.filter(t=>t.cat===cat&&t.type==='expense').reduce((s,t)=>s+t.amount,0);}

function parseCSV(text,bank){
  const lines=text.split('\n').filter(l=>l.trim());
  const txns=[];
  lines.forEach((line,i)=>{
    const first=line.split(',')[0].replace(/"/g,'').trim();
    if(i===0&&isNaN(parseFloat(first))&&!/^\d{1,2}[\/\-]/.test(first))return;
    const cols=line.split(',').map(c=>c.replace(/^"|"$/g,'').trim());
    if(cols.length<2)return;
    let date='',desc='',amount=0;
    cols.forEach(c=>{
      const cl=c.replace(/[$,\s]/g,'');
      if(/^\d{4}-\d{2}-\d{2}/.test(c))date=c;
      else if(/^\d{1,2}[\/]\d{1,2}[\/]\d{2,4}/.test(c)){const p=c.split('/');date=`${p[2].length===2?'20'+p[2]:p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`;}
      else if(!isNaN(parseFloat(cl))&&Math.abs(parseFloat(cl))>0&&cl.length>0)amount=Math.abs(parseFloat(cl));
      else if(c.length>2&&isNaN(parseFloat(cl))&&!['debit','credit','checking','savings','transaction'].includes(c.toLowerCase()))desc=desc||c;
    });
    if(amount&&desc&&amount<50000){
      const q=quickCat(desc);
      txns.push({id:Date.now()+Math.random(),date:date||new Date().toISOString().slice(0,10),desc:desc.substring(0,60),amount,type:q.group==='Income'?'income':'expense',cat:q.cat,group:q.group,bank:bank||'Import',isNew:q.group==='Uncategorized',flag:q.flag||null});
    }
  });
  return txns;
}


// ═══════════════════════════════ PDF PARSER ══════════════════════════════════
// Uses position-based row reconstruction — groups text items by Y coordinate
// so each visual line in the PDF stays together, regardless of column layout.

async function parsePDF(file) {
  try {
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
    const bank = file.name.replace(/\.pdf$/i,'');
    const allTxns = [];

    for (let p = 1; p <= pdf.numPages; p++) {
      const page = await pdf.getPage(p);
      const textContent = await page.getTextContent();
      const rows = buildRows(textContent.items);
      const txns = parseRows(rows, bank);
      allTxns.push(...txns);
    }

    // Deduplicate by date+amount+desc
    const seen = new Set();
    return allTxns.filter(t => {
      const key = t.date + t.amount + t.desc.slice(0,15);
      if (seen.has(key)) return false;
      seen.add(key); return true;
    });
  } catch(e) {
    console.error('PDF parse error:', e);
    alert('Could not read PDF: ' + e.message + '. Try downloading a CSV from your bank instead — it works more reliably.');
    return [];
  }
}

// Group PDF text items into visual rows by Y position (within 3px tolerance)
function buildRows(items) {
  const rows = [];
  items.forEach(item => {
    if (!item.str.trim()) return;
    const y = Math.round(item.transform[5]);
    const x = item.transform[4];
    const existing = rows.find(r => Math.abs(r.y - y) <= 3);
    if (existing) {
      existing.items.push({x, text: item.str.trim()});
    } else {
      rows.push({y, items: [{x, text: item.str.trim()}]});
    }
  });
  // Sort rows top-to-bottom, items left-to-right within each row
  rows.sort((a,b) => b.y - a.y);
  rows.forEach(r => r.items.sort((a,b) => a.x - b.x));
  // Convert to plain text lines
  return rows.map(r => r.items.map(i => i.text).join(' '));
}

// Parse reconstructed rows into transactions
function parseRows(lines, bank) {
  const txns = [];
  const DATE_RE = /(\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}|\d{4}-\d{2}-\d{2}|(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\.?\s*\d{1,2},?\s*\d{4})/i;
  const AMT_RE  = /\$?([\d,]{1,10}\.\d{2})/g;

  lines.forEach((line, idx) => {
    // Must contain a date
    const dm = line.match(DATE_RE);
    if (!dm) return;

    // Parse the date
    let date = '';
    const ds = dm[1];
    if (/\d{4}-\d{2}-\d{2}/.test(ds)) {
      date = ds;
    } else if (/\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}/.test(ds)) {
      const sep = ds.includes('/') ? '/' : '-';
      const [mo,dy,yr] = ds.split(sep);
      date = `${yr.length===2?'20'+yr:yr}-${mo.padStart(2,'0')}-${dy.padStart(2,'0')}`;
    } else {
      try { const d = new Date(ds); if(!isNaN(d)) date = d.toISOString().slice(0,10); } catch(e){}
    }
    if (!date) return;

    // Collect all dollar amounts in this line
    const amounts = [];
    let m;
    const ar = /\$?([\d,]{1,10}\.\d{2})/g;
    while ((m = ar.exec(line)) !== null) {
      const v = parseFloat(m[1].replace(/,/g,''));
      if (v > 0.01 && v < 50000) amounts.push(v);
    }
    if (amounts.length === 0) return;

    // Use the last amount (usually the transaction amount in bank statements)
    const amount = amounts[amounts.length - 1];

    // Description = line minus date and all dollar values, cleaned
    let desc = line
      .replace(dm[0], '')
      .replace(/\$?[\d,]{1,10}\.\d{2}/g, '')
      .replace(/\b(debit|credit|purchase|payment|pos|ach|withdrawal|deposit|transfer)\b/gi, '')
      .replace(/\s{2,}/g, ' ')
      .trim();

    // If description is too short, peek at next line
    if (desc.length < 4 && lines[idx+1]) {
      const next = lines[idx+1];
      if (!DATE_RE.test(next) && !/\$?[\d,]+\.\d{2}/.test(next)) {
        desc = next.trim().substring(0, 60);
      }
    }

    desc = desc.replace(/^[\s\-\*\.]+|[\s\-\*\.]+$/g, '').substring(0, 60);
    if (desc.length < 2) return;

    // Skip lines that look like running balances or totals
    const lower = line.toLowerCase();
    if (/\b(balance|total|subtotal|opening|closing|brought forward|carried forward)\b/.test(lower)) return;

    const q = quickCat(desc);
    txns.push({
      id: Date.now() + Math.random(),
      date, desc, amount,
      type: q.group === 'Income' ? 'income' : 'expense',
      cat: q.cat, group: q.group,
      bank: bank + ' (PDF)',
      isNew: q.group === 'Uncategorized',
      flag: q.flag || null,
    });
  });
  return txns;
}

function getBudgetSugs(){
  const sug=[];
  allItems().forEach(r=>{
    const hist=S.budgetHistory[r.cat]||[];
    if(hist.length>=2){
      const over=hist.filter(h=>h.actual>r.budget*1.1);
      if(over.length>=2){
        const avg=Math.round(hist.reduce((s,h)=>s+h.actual,0)/hist.length);
        sug.push({type:'budget_suggestion',severity:'warning',cat:r.cat,current:r.budget,suggested:avg,title:`Update ${r.cat} budget?`,description:`You've averaged ${fmt(avg)}/mo over ${hist.length} months (budget: ${fmt(r.budget)}). Suggest updating to ${fmt(avg)}/mo.`});
      }
    }
  });
  return sug;
}
function getAnomalies(){
  const flags=[];
  const unc=S.transactions.filter(t=>t.group==='Uncategorized'||t.isNew);
  if(unc.length>0)flags.push({type:'new_category',severity:'warning',title:`${unc.length} uncategorized transaction${unc.length>1?'s':''}`,description:'Some transactions need category assignment. Review them in Transactions.'});
  S.transactions.filter(t=>t.type==='expense'&&t.amount>500).forEach(t=>{const key='Large:'+t.id;if(!S.dismissedInsights.includes(key))flags.push({type:'anomaly',severity:'info',title:`Large charge: ${fmt(t.amount)}`,description:`${t.desc} on ${t.date}. Is this expected?`,dkey:key});});
  const flagged=S.transactions.filter(t=>t.flag);
  if(flagged.length>0)flags.push({type:'new_category',severity:'alert',title:`${flagged.length} expense${flagged.length>1?'s':''} not in budget`,description:`Includes: ${[...new Set(flagged.map(t=>t.flag))].slice(0,3).join(', ')}.`});
  return flags;
}

function handleFiles(files){

  document.getElementById('rev-list').innerHTML=txns.map((t,i)=>`<div class="review-item"><div class="ri-desc">${t.desc}${t.flag?`<span class="bdn br" style="font-size:9px;margin-left:5px">${t.flag}</span>`:''}<div style="font-size:10px;color:var(--tx3)">${t.date} · ${t.bank}</div></div><div class="ri-amt">${fmt(t.amount)}</div><select style="width:140px;padding:4px 7px;font-size:12px;flex-shrink:0" onchange="upPend(${i},'cat',this.value)">${allCats.map(c=>`<option value="${c}"${c===t.cat?' selected':''}>${c}</option>`).join('')}</select><select style="width:82px;padding:4px 7px;font-size:12px;flex-shrink:0" onchange="upPend(${i},'type',this.value)"><option value="expense"${t.type==='expense'?' selected':''}>Expense</option><option value="income"${t.type==='income'?' selected':''}>Income</option></select></div>`).join('');
  document.getElementById('rev-modal').style.display='flex';
  if(S.apiKey&&unc>0){
    document.getElementById('rev-summary').innerHTML+=` <span style="color:var(--b);font-size:12px">⚡ AI categorizing…</span>`;
    try{
      const uncItems=txns.filter(t=>t.group==='Uncategorized');
      const aiR=await aiCategorize(uncItems);
      aiR.forEach(r=>{if(r.idx!==undefined){const ri=txns.indexOf(uncItems[r.idx]);if(ri>=0){pendingImport[ri].cat=r.cat||pendingImport[ri].cat;pendingImport[ri].group=r.group||pendingImport[ri].group;pendingImport[ri].type=r.type||pendingImport[ri].type;pendingImport[ri].isNew=r.isNew||false;}}});
      document.getElementById('rev-summary').innerHTML=`Found <strong>${txns.length} transactions</strong>. ✅ AI categorization complete. Review below.`;
      openReview(pendingImport);

}
function upPend(i,f,v){if(pendingImport[i]){pendingImport[i][f]=v;if(f==='cat'){const item=allItems().find(r=>r.cat===v);pendingImport[i].group=item?item.group:(v==='Income'?'Income':'Uncategorized');pendingImport[i].isNew=pendingImport[i].group==='Uncategorized';}}}
function confirmImport(){
  pendingImport.forEach(t=>{
    S.transactions.unshift(t);
    if(t.type==='expense'){
      const mo=t.date.substring(0,7);
      if(!S.budgetHistory[t.cat])S.budgetHistory[t.cat]=[];
      const ex=S.budgetHistory[t.cat].find(h=>h.month===mo);
      if(ex)ex.actual+=t.amount;else S.budgetHistory[t.cat].push({month:mo,actual:t.amount});
    }
  });
  pendingImport=[];save();closeRev();goTo('transactions');
}
function closeRev(){document.getElementById('rev-modal').style.display='none';}
function addManualTx(){
  const date=document.getElementById('tx-d').value,type=document.getElementById('tx-t').value,desc=document.getElementById('tx-de').value.trim(),amt=parseFloat(document.getElementById('tx-a').value),cat=document.getElementById('tx-c').value;
  if(!desc||!amt||!date){alert('Fill in date, description and amount.');return;}
  const item=allItems().find(r=>r.cat===cat);
  S.transactions.unshift({id:Date.now(),date,type,desc,amount:amt,cat,group:item?item.group:(cat==='Income'?'Income':'Uncategorized'),bank:'Manual',isNew:false});

// ─── TRANSACTIONS ────────────────────────────────────────────────────────────
function pTransactions(){

  const tExp=S.transactions.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);

  ${unc.length>0?`<div class="sec" style="border-color:var(--a);margin-bottom:14px"><div class="stt" style="color:var(--a)">⚠️ Uncategorized (${unc.length}) — assign categories or add to budget</div>

  <select style="width:130px;padding:4px 7px;font-size:12px" onchange="reCat(${t.id},this.value)"><option value="">Assign…</option>${allCats.map(c=>`<option value="${c}">${c}</option>`).join('')}</select>

  ${unc.length>5?`<div style="font-size:12px;color:var(--tx3);margin-top:6px">+ ${unc.length-5} more below</div>`:''}</div>`:''}
  ${Object.entries(groups).filter(([g])=>g!=='Uncategorized').map(([group,gtxns])=>{
    const tot=gtxns.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
    const bTot=allItems().filter(r=>r.group===group).reduce((s,r)=>s+r.budget,0),dev=tot-bTot;
    return`<div class="cat-section"><div class="cat-header" onclick="togGrp('${group}')">
      <div class="cat-name">${GICO[group]||'📌'} ${group} <span class="bdn ${dev>5?'br':dev<-5?'bg':'bb'}" style="font-size:10px">${devLbl(dev)}</span></div>
      <div class="cat-stats"><span class="${dev>5?'r':dev<-5?'g':''}" style="font-weight:600">${fmt(tot)}</span><span style="color:var(--tx3)">/ ${fmt(bTot)}</span><span style="color:var(--tx3)">${gtxns.length} tx</span><span id="tog-${group}" style="color:var(--tx3)">▼</span></div>
    </div><div class="cat-body" id="grp-${group}" style="display:none">
    ${gtxns.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(t=>`<div class="tx-item" style="padding:8px 14px">
      <div class="tx-av" style="background:${GCOL[group]||'#ccc'}22">${GICO[group]||'📌'}</div>
      <div class="tx-inf"><div class="tx-nm">${t.desc}${t.flag?`<span class="bdn br" style="font-size:9px;margin-left:5px">${t.flag}</span>`:''}</div>
      <div class="tx-mt">${t.date} · ${t.cat}</div></div>
      <div class="tx-am ${t.type==='income'?'g':'r'}">${t.type==='income'?'+':'-'}${fmt(t.amount)}</div>

  }).join('')}`;
}
function togGrp(g){const el=document.getElementById('grp-'+g),tog=document.getElementById('tog-'+g);if(el){const v=el.style.display==='none';el.style.display=v?'block':'none';if(tog)tog.textContent=v?'▲':'▼';}}
function delTx(id){if(confirm('Delete this transaction?')){S.transactions=S.transactions.filter(t=>t.id!==id);save();renderPage();}}
function reCat(id,cat){const t=S.transactions.find(x=>x.id===id);if(!t)return;const item=allItems().find(r=>r.cat===cat);t.cat=cat;t.group=item?item.group:(cat==='Income'?'Income':'Uncategorized');t.isNew=t.group==='Uncategorized';save();renderPage();}
function addAsNew(id){const t=S.transactions.find(x=>x.id===id);if(!t)return;const catName=prompt('New budget category name:',t.desc.substring(0,25));if(!catName)return;const budgetAmt=parseFloat(prompt(`Monthly budget for "${catName}":`,Math.round(t.amount))||'0');S.customItems.push({cat:catName,budget:budgetAmt||t.amount,group:'Other',isCustom:true});t.cat=catName;t.group='Other';t.isNew=false;save();renderPage();}

// ─── BUDGET vs ACTUAL ────────────────────────────────────────────────────────

  const rows=allItems().map(r=>{const a=txActual(r.cat),dev=a-r.budget,pct=r.budget>0?Math.min(160,Math.round(a/r.budget*100)):0;tB+=r.budget;tA+=a;const hs=sug.find(s=>s.cat===r.cat);
    return`<tr><td style="font-weight:500">${GICO[r.group]||''} ${r.cat}<br><span style="font-size:10px;color:var(--tx3)">${r.group}</span></td>

  return`<div class="ph"><div class="ph-left"><h2>Budget vs Actual</h2><p>Edit any budget amount directly. AI suggests updates after consistent patterns.</p></div></div>
  ${sug.length>0?`<div class="sec" style="border-color:var(--a);margin-bottom:14px"><div class="stt" style="color:var(--a)">💡 Budget Update Suggestions (${sug.length})</div>
  ${sug.map(s=>`<div class="insight-item warn"><h4>${s.title}</h4><p>${s.description}</p><div style="display:flex;gap:6px;margin-top:6px"><button class="btn xs pri" onclick="acceptSug('${s.cat}',${s.suggested})">Accept ${fmt(s.suggested)}/mo</button><button class="btn xs" onclick="dismissI('${s.title}')">Dismiss</button></div></div>`).join('')}</div>`:''}
  <div class="sec"><div class="stt">Budget vs Actual <span>Click amount to edit</span></div>
    <table><thead><tr><th>Category</th><th>Budget</th><th>Actual (this session)</th><th>Deviation</th><th>Usage</th><th>AI Tip</th></tr></thead>
    <tbody>${rows}</tbody>
    <tfoot><tr class="tr-total"><td>Total</td><td>${fmt(tB)}</td><td>${fmt(tA)}</td><td class="${(tA-tB)>5?'r':'g'}">${devLbl(tA-tB)}</td><td colspan="2"></td></tr></tfoot></table>
    <div style="margin-top:12px;padding:10px;background:var(--surf2);border-radius:var(--rad-s);font-size:13px;display:flex;gap:20px;flex-wrap:wrap">
      Actual surplus: <strong class="${surplus>=0?'g':'r'}">${fmt(surplus)}</strong> &nbsp;·&nbsp; Budgeted: <strong class="g">${fmt(MONTHLY_SURPLUS)}</strong>
    </div>
  </div>`;
}
function upBudget(cat,v){const item=allItems().find(r=>r.cat===cat);if(item){item.budget=parseFloat(v)||0;save();}}

// ─── CLOSE MONTH ─────────────────────────────────────────────────────────────
function openCloseMonth(){
  const mo=curMonthKey();
  const alreadyClosed=S.closedMonths.find(m=>m.key===mo);
  if(alreadyClosed){if(!confirm(`${monthLabel(mo)} is already closed. Re-close it with updated numbers?`))return;S.closedMonths=S.closedMonths.filter(m=>m.key!==mo);}
  const cats={};allItems().forEach(r=>{cats[r.cat]=txActual(r.cat);});
  const tExp=Object.values(cats).reduce((s,v)=>s+v,0),surplus=MONTHLY_INCOME-tExp;
  const debtBals={};S.debts.forEach(d=>debtBals[d.id]=d.balance);
  const sinkBals={};S.sinking.forEach(i=>sinkBals[i.id]=i.saved||0);
  pendingCloseMonth={key:mo,income:MONTHLY_INCOME,totalExpenses:tExp,surplus,categories:cats,debtBalances:debtBals,sinkingBalances:sinkBals,closed:true,closedAt:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})};
  document.getElementById('cm-lbl').textContent=monthLabel(mo);
  document.getElementById('cm-body').innerHTML=`Income: <strong class="g">${fmt(MONTHLY_INCOME)}</strong>&nbsp;&nbsp; Expenses: <strong class="r">${fmt(tExp)}</strong>&nbsp;&nbsp; Surplus: <strong class="${surplus>=0?'g':'r'}">${fmt(surplus)}</strong><br><br>Top categories:<br>${Object.entries(cats).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([c,v])=>`${c}: <strong>${fmt(v)}</strong>`).join(' &nbsp;·&nbsp; ')}`;
  document.getElementById('cm-modal').style.display='flex';
}
function confirmCloseMonth(){
  if(!pendingCloseMonth)return;
  S.closedMonths.push(pendingCloseMonth);
  S.closedMonths.sort((a,b)=>a.key.localeCompare(b.key));
  pendingCloseMonth=null;
  save();document.getElementById('cm-modal').style.display='none';
  goTo('analytics');
}

  </div></div>`;
}
async function sendChat(){const input=document.getElementById('chat-in');const msg=input?.value?.trim();if(!msg||!S.apiKey)return;input.value='';S.chatHistory.push({role:'user',content:msg});renderPage();const me=document.getElementById('chat-msgs');if(me){const t=document.createElement('div');t.className='msg ai thinking';t.textContent='Thinking…';me.appendChild(t);me.scrollTop=me.scrollHeight;}try{const reply=await aiChatMsg(msg);S.chatHistory.push({role:'assistant',content:reply});}catch(e){S.chatHistory.push({role:'assistant',content:`Error: ${e.message}. Check your API key in Settings.`});}save();renderPage();setTimeout(()=>{const el=document.getElementById('chat-msgs');if(el)el.scrollTop=el.scrollHeight;},50);}
function qChat(q){if(document.getElementById('chat-in')){document.getElementById('chat-in').value=q;sendChat();}else{S.chatHistory.push({role:'user',content:q});renderPage();setTimeout(sendChat,100);}}

// ─── DEBTS ───────────────────────────────────────────────────────────────────
function pDebts(){
  const tE=S.debts.reduce((s,d)=>s+(parseFloat(S.debtExtras[d.id])||0),0),rem=MONTHLY_SURPLUS-tE;
  return`<div class="ph"><div class="ph-left"><h2>Debt Payoff</h2><p>Update balances as you pay down. Hit ✅ Done when a debt is fully cleared.</p></div></div>
  ${S.archivedDebts.length>0?`<div class="celebrate"><div class="trophy">🎉</div><div style="font-weight:700;font-size:15px;margin-bottom:6px">Debts Cleared!</div>${S.archivedDebts.map(d=>`<div style="font-size:13px;margin-bottom:3px"><strong>${d.name}</strong> — ${fmt(d.originalBalance||0)} — Paid off ${d.paidOffDate||'?'}</div>`).join('')}</div>`:''}
  <div class="sec"><div class="stt">Active debts <span>Edit balance &amp; extra payment — recalculates instantly</span></div>
    <table><thead><tr><th>Debt</th><th>Balance</th><th>Min/mo</th><th>Extra/mo</th><th>Total/mo</th><th>Months left</th><th></th></tr></thead>
    <tbody>${S.debts.map(d=>{const ex=parseFloat(S.debtExtras[d.id])||0,mo=d.monthly+ex,months=mo>0?Math.ceil(d.balance/mo):null;
      return`<tr><td><span style="width:9px;height:9px;border-radius:50%;background:${d.color};display:inline-block;margin-right:6px;vertical-align:middle"></span><strong>${d.name}</strong></td>
      <td><input type="number" value="${(d.balance||0).toFixed(2)}" min="0" step="10" style="width:100px;padding:4px 7px;font-size:12px" onchange="upDB('${d.id}',this.value)"></td>
      <td style="color:var(--tx3)">${d.monthly>0?fmt(d.monthly):'—'}</td>
      <td><input type="number" value="${ex}" min="0" step="50" style="width:78px;padding:4px 7px;font-size:12px" onchange="upDE('${d.id}',this.value)"></td>
      <td style="font-weight:600">${mo>0?fmt(mo):'—'}</td>
      <td><span class="bdn ${(d.balance||0)<1000?'bg':(d.balance||0)<5000?'ba':'br'}">${months===null?'No payment':months+' mo'}</span></td>
      <td><button class="btn xs pri" onclick="markPaidOff('${d.id}')">✅ Done</button></td></tr>`;
    }).join('')}</tbody></table>
    <div style="margin-top:12px;padding:10px;background:var(--surf2);border-radius:var(--rad-s);font-size:13px;display:flex;gap:16px;flex-wrap:wrap">
      Extra payments: <strong class="r">${fmt(tE)}</strong> &nbsp;·&nbsp; Surplus left: <strong class="${rem>=0?'g':'r'}">${fmt(rem)}</strong>
    </div>
  </div>
  <div class="sec"><div class="stt">Recommended order · Avalanche Method</div>
    <div style="font-size:13px;line-height:2.2">Surplus: <strong class="g">${fmt(MONTHLY_SURPLUS)}/mo</strong><br>
    <strong>Step 1</strong> — CitiBank ($446) → clear in <strong>~1 month</strong><br>
    <strong>Step 2</strong> — Chase MJ ($900) → clear in <strong>~1 month</strong> (freed money from Step 1)<br>
    <strong>Step 3</strong> — Chase KK ($1,500) → clear in <strong>~1–2 months</strong><br>
    <strong>Step 4</strong> — Best Buy ($1,734) → accelerate from $300/mo → clear in <strong>~3 months</strong><br>
    <strong>Step 5</strong> — Roll ALL freed payments into Hyundai principal every month<br>
    <span style="font-size:11px;color:var(--tx3)">Steps 1–4 take ~6 months and free over $300/mo permanently.</span></div>
  </div>`;
}
function upDB(id,v){const d=S.debts.find(x=>x.id===id);if(d){d.balance=parseFloat(v)||0;save();}}
function upDE(id,v){S.debtExtras[id]=parseFloat(v)||0;save();renderPage();}
function markPaidOff(id){
  const d=S.debts.find(x=>x.id===id);if(!d)return;
  if(!confirm(`Mark "${d.name}" as fully paid off?`))return;
  S.archivedDebts.push({...d,paidOffDate:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),originalBalance:DEBTS_SEED.find(x=>x.id===id)?.balance||d.balance});
  S.debts=S.debts.filter(x=>x.id!==id);
  save();renderPage();
}

// ─── SINKING FUND ────────────────────────────────────────────────────────────
function pSinking(){
  const tT=S.sinking.reduce((s,i)=>s+i.target,0),tS=S.sinking.reduce((s,i)=>s+(i.saved||0),0),rem=Math.max(0,tT-tS);
  return`<div class="ph"><div class="ph-left"><h2>Sinking Fund</h2><p>2026 planned one-time expenses. Mark complete when a goal is reached.</p></div></div>
  ${S.completedSinking.length>0?`<div class="celebrate"><div class="trophy">🏆</div><div style="font-weight:700;font-size:15px;margin-bottom:6px">${S.completedSinking.length} Goal${S.completedSinking.length>1?'s':''} Reached!</div>${S.completedSinking.map(i=>`<div style="font-size:13px;margin-bottom:3px"><strong>${i.name}</strong> — ${fmt(i.target)} — ${i.completedDate||'?'}</div>`).join('')}</div>`:''}
  <div class="sgrid" style="grid-template-columns:repeat(3,1fr)">
    <div class="sc"><div class="l">Total needed</div><div class="v r">${fmt(tT)}</div></div>
    <div class="sc"><div class="l">Saved so far</div><div class="v g">${fmt(tS)}</div></div>
    <div class="sc"><div class="l">Still needed</div><div class="v a">${fmt(rem)}</div><div class="s">${Math.ceil(rem/MONTHLY_SURPLUS)} months of surplus</div></div>
  </div>
  <div class="sec"><div class="stt">Active goals</div>
    <table><thead><tr><th>Goal</th><th>Target</th><th>Saved</th><th>Remaining</th><th>Progress</th><th></th></tr></thead>
    <tbody>${S.sinking.map(item=>{const sv=item.saved||0,rm=Math.max(0,item.target-sv),pct=Math.min(100,Math.round(sv/item.target*100));
      return`<tr><td style="font-weight:500">${item.name}</td><td>${fmt(item.target)}</td>
      <td><input type="number" value="${sv.toFixed(2)}" min="0" step="50" style="width:100px;padding:4px 7px;font-size:12px" onchange="upSk('${item.id}',this.value)"></td>
      <td class="${rm===0?'g':'a'}">${rm===0?'Ready!':fmt(rm)}</td>
      <td><div style="display:flex;align-items:center;gap:8px"><div class="prog" style="width:90px"><div class="pf" style="width:${pct}%;background:${pct===100?'var(--g)':pct>60?'#e67e22':'var(--r)'}"></div></div><span style="font-size:11px;color:var(--tx3)">${pct}%</span></div></td>
      <td>${pct>=100?`<button class="btn xs pri" onclick="markGoalDone('${item.id}')">🎉 Complete!</button>`:`<span style="font-size:11px;color:var(--tx3)">~${Math.ceil(rm/MONTHLY_SURPLUS)}mo</span>`}</td></tr>`;
    }).join('')}</tbody></table>
    <div style="margin-top:12px;padding:10px;background:var(--surf2);border-radius:var(--rad-s);font-size:12px;color:var(--tx2);line-height:1.8">
      💡 EB2 ($10k) + Asylum ($10k) = $20,000. At $2,013/mo surplus those take ~${Math.ceil(20000/MONTHLY_SURPLUS)} months. Consider opening a dedicated high-yield savings account for immigration fees now.
    </div>
  </div>`;
}
function upSk(id,v){const i=S.sinking.find(x=>x.id===id);if(i){i.saved=parseFloat(v)||0;save();}}
function markGoalDone(id){
  const item=S.sinking.find(x=>x.id===id);if(!item)return;
  if(!confirm(`Mark "${item.name}" as completed?`))return;
  S.completedSinking.push({...item,completedDate:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})});
  S.sinking=S.sinking.filter(x=>x.id!==id);
  save();renderPage();
}

// ─── YEAR END ─────────────────────────────────────────────────────────────────
function pYearEnd(){
  const yr=S.currentYear,tSurplus=S.closedMonths.reduce((s,m)=>s+(m.surplus||0),0);
  const tExp=S.closedMonths.reduce((s,m)=>s+(m.totalExpenses||0),0),tInc=S.closedMonths.length*MONTHLY_INCOME;
  const debtCleared=S.archivedDebts.reduce((s,d)=>s+(d.originalBalance||0),0);
  return`<div class="ph"><div class="ph-left"><h2>Year End</h2><p>Review annual performance, archive the year, and start fresh for ${yr+1}.</p></div></div>
  <div class="sec"><div class="stt">${yr} Year-to-Date Summary</div>
    <div class="year-row"><span>Months closed so far</span><strong>${S.closedMonths.length} of 12</strong></div>
    <div class="year-row"><span>Total income (closed months)</span><strong class="g">${fmt(tInc)}</strong></div>
    <div class="year-row"><span>Total expenses (closed months)</span><strong class="r">${fmt(tExp)}</strong></div>
    <div class="year-row"><span>Total surplus generated</span><strong class="g">${fmt(tSurplus)}</strong></div>
    <div class="year-row"><span>Debt fully paid off this year</span><strong class="g">${fmt(debtCleared)}</strong></div>
    <div class="year-row"><span>Sinking fund goals completed</span><strong class="pu">${S.completedSinking.length} goals</strong></div>
    <div class="year-row"><span>Active debts remaining</span><strong class="r">${S.debts.length} · ${fmt(S.debts.reduce((s,d)=>s+d.balance,0))}</strong></div>
    <div class="year-row"><span>Sinking fund goals still active</span><strong class="a">${S.sinking.length} goals remaining</strong></div>
  </div>
  ${S.closedMonths.length<12?`<div class="insight-item info"><h4>📅 ${12-S.closedMonths.length} months not yet closed</h4><p>Close all remaining months before archiving the year. Use the "Close Month" button on the Dashboard or Analytics page.</p></div>`:`
  <div class="sec" style="border-color:var(--g)"><div class="stt" style="color:var(--g)">🎊 All 12 months closed — ready to archive ${yr}</div>
    <p style="font-size:13px;color:var(--tx2);margin-bottom:14px;line-height:1.7">Archiving ${yr} saves a permanent annual summary and prepares the app for ${yr+1}. All history is kept forever. Active debts and unfinished sinking goals carry forward automatically.</p>
    <button class="btn pri" onclick="archiveYear()">Archive ${yr} &amp; Start ${yr+1}</button>
  </div>`}
  ${S.archivedYears.length>0?`<div class="sec"><div class="stt">Archived Years</div>
    ${S.archivedYears.map(y=>`<div style="padding:12px;background:var(--surf2);border-radius:var(--rad-s);margin-bottom:8px">
      <div style="font-weight:700;font-size:15px;margin-bottom:8px">${y.year}</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;font-size:12px">
        <div>Income: <strong class="g">${fmt(y.totalIncome||0)}</strong></div>
        <div>Expenses: <strong class="r">${fmt(y.totalExpenses||0)}</strong></div>
        <div>Surplus: <strong class="g">${fmt(y.totalSurplus||0)}</strong></div>
        <div>Debt cleared: <strong class="g">${fmt(y.debtCleared||0)}</strong></div>
        <div>Goals reached: <strong class="pu">${y.goalsReached||0}</strong></div>
      </div>
    </div>`).join('')}
  </div>`:'' }`;
}
function archiveYear(){
  const yr=S.currentYear;
  if(!confirm(`Archive ${yr} and start ${yr+1}? All history is permanently kept.`))return;
  const tSurplus=S.closedMonths.reduce((s,m)=>s+(m.surplus||0),0);
  const tExp=S.closedMonths.reduce((s,m)=>s+(m.totalExpenses||0),0);
  S.archivedYears.push({year:yr,totalIncome:S.closedMonths.length*MONTHLY_INCOME,totalExpenses:tExp,totalSurplus:tSurplus,debtCleared:S.archivedDebts.reduce((s,d)=>s+(d.originalBalance||0),0),goalsReached:S.completedSinking.length,monthsClosed:S.closedMonths.length});
  S.currentYear=yr+1;
  S.transactions=[];
  S.closedMonths=[];
  S.completedSinking=[];
  S.archivedDebts=[];
  save();alert(`${yr} archived! Starting ${yr+1}.`);goTo('dashboard');
}

// ─── SETTINGS ────────────────────────────────────────────────────────────────
function pSettings(){
  return`<div class="ph"><div class="ph-left"><h2>Settings</h2><p>API key for AI features and data management.</p></div></div>
  <div class="sec"><div class="stt">⚡ Anthropic API Key</div>
    <div style="font-size:13px;color:var(--tx2);line-height:1.8;margin-bottom:12px">Powers smart categorization, anomaly detection, budget suggestions, and AI chat. Get a key at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a> — load $5, it lasts months. Stored only in this browser.</div>
    <div class="fgrid c2"><div><div class="fl">API Key</div><input type="password" id="aki" placeholder="sk-ant-api03-…" value="${S.apiKey}"></div>
    <div style="display:flex;align-items:flex-end;gap:8px"><button class="btn pri" onclick="saveKey()">Save</button><button class="btn" onclick="testKey()">Test</button>${S.apiKey?`<button class="btn" onclick="S.apiKey='';save();renderNav();renderPage()">Remove</button>`:''}</div></div>
    <div id="key-st" style="margin-top:8px;font-size:12px"></div>
  </div>
  <div class="sec"><div class="stt">Data management</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn" onclick="exportData()">📥 Export backup (JSON)</button>
      <button class="btn warn" onclick="importBackup()">📤 Import backup</button>
      <button class="btn dan" onclick="if(confirm('Reset ALL data to factory defaults? Cannot be undone.')) resetData()">⚠️ Reset all data</button>
    </div>
    <div style="margin-top:10px;font-size:12px;color:var(--tx3)">Data saved in browser localStorage. Export a backup regularly. When you're ready to share between devices, you can upgrade to Firebase sync — just ask.</div>
  </div>
  <div class="sec"><div class="stt">About</div>
    <div style="font-size:13px;color:var(--tx2);line-height:1.8"><strong>The Kariolas Smart Finance Hub</strong><br>CSV import · AI categorization · MoM/YoY analytics · Debt &amp; sinking fund tracking<br>Month &amp; year closing · Budget intelligence · Ask AI chat<br>2026 budget pre-loaded from your spreadsheets · No subscriptions · No servers · No ads</div>
  </div>`;
}
function saveKey(){const k=document.getElementById('aki').value.trim();S.apiKey=k;save();renderNav();const el=document.getElementById('key-st');if(el)el.innerHTML='<span class="g">✓ Key saved</span>';}
async function testKey(){const el=document.getElementById('key-st');if(el)el.textContent='Testing…';try{await aiCall('Say OK.',null,false);if(el)el.innerHTML='<span class="g">✅ Connected!</span>';}catch(e){if(el)el.innerHTML=`<span class="r">❌ ${e.message}</span>`;}}
function exportData(){const a=document.createElement('a');a.href='data:application/json,'+encodeURIComponent(JSON.stringify(S,null,2));a.download='kariola-backup-'+new Date().toISOString().slice(0,10)+'.json';a.click();}
function importBackup(){const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.onchange=e=>{const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);Object.keys(S).forEach(k=>{if(d[k]!==undefined)S[k]=d[k];});save();renderPage();alert('Backup restored!');}catch(e){alert('Could not read backup: '+e.message);}};r.readAsText(e.target.files[0]);};inp.click();}
function resetData(){localStorage.removeItem(SK);location.reload();}

// ═══════════════════════════════════════ BOOT ════════════════════════════════
load();renderNav();renderPage();
</script>
</body>
</html>
