<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi-Asset Oversold Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090c;--s1:#0d1117;--s2:#131920;--s3:#1a2230;
  --b:rgba(255,255,255,0.05);--b2:rgba(255,255,255,0.09);--b3:rgba(255,255,255,0.16);
  --text:#e2e8f0;--muted:#5a6a82;--mu2:#2d3a4a;
  --green:#00d68f;--gdim:rgba(0,214,143,0.10);
  --red:#ff4d6d;--rdim:rgba(255,77,109,0.10);
  --amber:#ffb830;--adim:rgba(255,184,48,0.10);
  --blue:#4d9fff;--bdim:rgba(77,159,255,0.10);
  --purple:#a78bfa;--pdim:rgba(167,139,250,0.10);
  --orange:#ff8c42;--odim:rgba(255,140,66,0.10);
  --mono:'DM Mono',monospace;--disp:'Syne',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:12px;line-height:1.4;min-height:100vh}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes spin{to{transform:rotate(360deg)}}
header{display:flex;align-items:center;justify-content:space-between;padding:8px 20px;border-bottom:1px solid var(--b)}
.logo{font-family:var(--disp);font-size:14px;font-weight:700;letter-spacing:-.02em}
.logo em{font-style:normal}
.live-dot{width:6px;height:6px;border-radius:50%;box-shadow:0 0 6px currentColor;animation:pulse 2s infinite;display:inline-block}
.asset-tabs{display:flex;gap:2px;padding:0 20px;background:var(--s1);border-bottom:2px solid var(--b2)}
.atab{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.05em;padding:8px 18px;cursor:pointer;color:var(--muted);border-bottom:3px solid transparent;background:none;border-top:none;border-left:none;border-right:none;transition:all .14s;white-space:nowrap;display:flex;align-items:center;gap:6px}
.atab:hover{color:var(--text)}
.regime-banner{display:none;align-items:center;justify-content:space-between;padding:5px 20px;font-size:11px;border-bottom:1px solid var(--b);border-left:3px solid transparent}
.regime-banner.show{display:flex}
.container{max-width:1500px;margin:0 auto;padding:10px 16px}
.tab-bar{display:flex;gap:2px;margin-bottom:10px;border-bottom:1px solid var(--b)}
.ptab{font-family:var(--mono);font-size:10px;font-weight:500;padding:6px 14px;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;transition:color .14s;white-space:nowrap}
.ptab:hover{color:var(--text)}
.ptab.active{color:var(--green);border-bottom-color:var(--green)}
.ptab-badge{background:var(--green);color:#000;font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;margin-left:4px;display:none}
.ptab-badge.show{display:inline}
.top-bar{display:flex;align-items:flex-end;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.fg{display:flex;flex-direction:column;gap:3px;min-width:100px;flex:0 0 auto}
.fl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
select{background:var(--s2);border:1px solid var(--b2);border-radius:4px;color:var(--text);font-family:var(--mono);font-size:11px;padding:5px 8px;outline:none;transition:border-color .14s}
select:focus{border-color:var(--green)}
select option{background:var(--s2)}
.scan-btn{font-family:var(--disp);font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;border:none;border-radius:4px;padding:7px 16px;cursor:pointer;transition:all .13s;white-space:nowrap}
.scan-btn:disabled{background:var(--s3)!important;color:var(--muted)!important;cursor:not-allowed}
.stop-btn{font-family:var(--disp);font-size:11px;font-weight:700;background:var(--red);color:#fff;border:none;border-radius:4px;padding:7px 14px;cursor:pointer;display:none}
.search-bar{display:flex;gap:8px;align-items:flex-end;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--b);flex-wrap:wrap}
.search-input{background:var(--s2);border:1px solid var(--green);border-radius:4px;color:var(--text);font-family:var(--mono);font-size:12px;padding:6px 10px;outline:none;width:250px}
.search-input:focus{box-shadow:0 0 0 2px rgba(0,214,143,0.15)}
.prog-wrap{margin-bottom:6px;display:none}
.prog-wrap.show{display:block}
.prog-bar{width:100%;height:3px;background:var(--s3);border-radius:2px;overflow:hidden;margin-bottom:4px}
.prog-fill{height:100%;border-radius:2px;transition:width .4s ease;width:0%}
.status{font-size:10px;color:var(--muted);min-height:14px}
.metrics{display:none;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:6px;margin-bottom:8px}
.metric{background:var(--s2);border:1px solid var(--b);border-radius:4px;padding:6px 10px}
.metric-val{font-family:var(--disp);font-size:14px;font-weight:600;line-height:1.2;margin-bottom:1px}
.metric-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:11px}
thead tr{background:var(--s2)}
th{font-size:9px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);padding:6px 6px;text-align:left;white-space:nowrap;border-bottom:1px solid var(--b2);cursor:pointer;user-select:none}
th:hover{color:var(--text);background:var(--s3)}
td{padding:5px 6px;border-bottom:1px solid var(--b);white-space:nowrap;vertical-align:middle}
tr:hover td{background:var(--s2);cursor:pointer}
tr:last-child td{border-bottom:none}
.results-card{background:var(--s1);border:1px solid var(--b2);border-radius:6px;overflow:hidden;margin-bottom:10px}
.tag{display:inline-block;font-size:9px;font-weight:500;padding:1px 5px;border-radius:3px}
.tg{background:var(--gdim);color:var(--green)}
.tr2{background:var(--rdim);color:var(--red)}
.ta{background:var(--adim);color:var(--amber)}
.tb{background:var(--bdim);color:var(--blue)}
.tm{background:var(--s3);color:var(--muted)}
.tp{background:var(--pdim);color:var(--purple)}
.to{background:var(--odim);color:var(--orange)}
.pos{color:var(--green)}.neg{color:var(--red)}.mu{color:var(--muted)}
.sbar{width:28px;height:3px;background:var(--s3);border-radius:2px;overflow:hidden;display:inline-block;vertical-align:middle;margin-left:3px}
.sbar-fill{height:100%;border-radius:2px}
.copy-btn{background:none;border:none;color:var(--mu2);cursor:pointer;font-size:9px;padding:1px 3px;border-radius:2px;transition:color .12s;font-family:var(--mono)}
.copy-btn:hover,.copy-btn.copied{color:var(--green)}
.add-btn{background:none;border:1px solid var(--mu2);color:var(--muted);cursor:pointer;font-size:9px;padding:1px 4px;border-radius:3px;transition:all .12s;font-family:var(--mono);margin-left:3px}
.add-btn:hover{border-color:var(--green);color:var(--green)}
.add-btn.added{border-color:var(--green);color:var(--green);background:var(--gdim)}
.prob-big{font-family:var(--disp);font-size:13px;font-weight:700}
.empty-state{text-align:center;padding:28px;color:var(--muted)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto}
.modal-overlay.show{display:flex}
.modal{background:var(--s1);border:1px solid var(--b2);border-radius:8px;padding:18px 22px;max-width:820px;width:100%;position:relative;margin:auto}
.modal-x{position:absolute;top:12px;right:16px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;line-height:1}
.modal-x:hover{color:var(--text)}
.mgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
.mstat{background:var(--s3);border-radius:4px;padding:7px 10px}
.mstat-v{font-size:13px;font-weight:500;margin-bottom:1px}
.mstat-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.sec{font-family:var(--disp);font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:8px;margin:10px 0 7px}
.sec::after{content:'';flex:1;height:1px;background:var(--b2)}
.abox{background:var(--s2);border:1px solid var(--b2);border-radius:5px;padding:10px 12px;font-size:11px;line-height:1.7}
.abox h4{font-size:10px;font-weight:500;margin-bottom:2px;margin-top:8px}
.abox h4:first-child{margin-top:0}
.epill{display:inline-block;font-size:10px;padding:2px 7px;border-radius:3px;border:1px solid var(--b2);color:var(--muted);margin:2px}
.epill.best{border-color:var(--green);color:var(--green);background:var(--gdim)}
.epill.ok{border-color:var(--blue);color:var(--blue);background:var(--bdim)}
.news-item{padding:5px 0;border-bottom:1px solid var(--b);font-size:11px;line-height:1.4}
.news-item:last-child{border-bottom:none}
.news-item a{color:var(--blue);text-decoration:none}
.spinner-sm{width:11px;height:11px;border:2px solid var(--b3);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:5px}
.prob-ring{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;width:58px;height:58px;border-radius:50%;border:2px solid}
.prob-pct{font-family:var(--disp);font-size:17px;font-weight:700;line-height:1}
.prob-lbl{font-size:8px;color:var(--muted);text-transform:uppercase}
.warn-box{background:rgba(255,184,48,0.07);border:1px solid rgba(255,184,48,0.25);border-radius:4px;padding:6px 10px;font-size:10px;color:var(--amber);margin-bottom:7px;display:flex;align-items:flex-start;gap:6px}
.data-gap{background:rgba(91,107,126,0.08);border:1px solid var(--b2);border-radius:4px;padding:7px 10px;font-size:10px;color:var(--muted);margin-top:8px}
.rtt-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--b)}
.rtt-pill{font-family:var(--mono);font-size:11px;padding:3px 9px;border-radius:4px;cursor:pointer;border:1px solid var(--b2);background:var(--s2);color:var(--muted);transition:all .12s}
.rtt-pill:hover,.rtt-pill.active{border-color:var(--green);color:var(--green);background:var(--gdim)}
.rtt-panel{background:var(--s1);border:1px solid var(--b2);border-radius:6px;overflow:hidden}
.viability-banner{padding:11px 13px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;gap:12px}
.vcheck{font-size:10px;padding:3px 7px;border-radius:3px;display:inline-flex;align-items:center;gap:4px;font-weight:500;margin:2px}
.vcheck.pass{background:var(--gdim);color:var(--green);border:1px solid rgba(0,214,143,0.2)}
.vcheck.fail{background:var(--rdim);color:var(--red);border:1px solid rgba(255,77,109,0.2)}
.vcheck.warn{background:var(--adim);color:var(--amber);border:1px solid rgba(255,184,48,0.2)}
.vcheck.unknown{background:var(--s3);color:var(--muted);border:1px solid var(--b2)}
.rtt-hdr{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-bottom:1px solid var(--b);background:var(--s2)}
.rtt-step{display:grid;grid-template-columns:24px 115px 1fr 175px;gap:8px;align-items:start;padding:8px 14px;border-bottom:1px solid var(--b);font-size:11px}
.rtt-step:last-child{border-bottom:none}
.rtt-step:hover{background:var(--s2)}
.rtt-n{font-family:var(--disp);font-size:11px;font-weight:700;color:var(--muted);padding-top:2px}
.rtt-lbl{font-weight:500;font-size:11px;padding-top:2px}
.rtt-auto{font-size:11px;line-height:1.5}
.ok{color:var(--green)}.warn-t{color:var(--amber)}.fail-t{color:var(--red)}
.rtt-acts{display:flex;flex-direction:column;gap:3px;align-items:flex-start}
.rtt-link{font-size:10px;color:var(--blue);text-decoration:none;padding:2px 6px;border:1px solid rgba(77,159,255,0.3);border-radius:3px;white-space:nowrap;display:inline-block}
.rtt-link:hover{background:var(--bdim)}
.rtt-chk{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted);margin-top:3px;cursor:pointer}
.rtt-chk input{width:11px;height:11px;accent-color:var(--green);cursor:pointer}
.peers{margin-top:4px}
.peer{display:flex;justify-content:space-between;font-size:10px;padding:2px 0;border-bottom:1px solid var(--b)}
.peer:last-child{border-bottom:none}
/* TEST TRACKER */
.test-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.test-card{background:var(--s2);border:1px solid var(--b2);border-radius:6px;padding:10px 14px;margin-bottom:8px}
.test-card.active{border-color:var(--green)}
.test-card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.test-card-title{font-family:var(--disp);font-size:12px;font-weight:600}
.test-card-meta{font-size:10px;color:var(--muted);margin-bottom:6px}
.test-card-btns{display:flex;gap:6px;flex-wrap:wrap}
.test-empty{text-align:center;padding:32px;color:var(--muted)}
.save-test-btn{background:var(--s3);color:var(--text);border:1px solid var(--b2);font-family:var(--disp);font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;border-radius:4px;padding:5px 12px;cursor:pointer;transition:all .12s;white-space:nowrap}
.save-test-btn:hover{border-color:var(--amber);color:var(--amber)}
.del-btn{background:none;border:1px solid var(--rdim);color:var(--red);cursor:pointer;font-size:9px;padding:2px 7px;border-radius:3px;font-family:var(--mono);transition:all .12s}
.del-btn:hover{background:var(--rdim)}
/* TOKEN SELECTION MODAL */
.sel-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.sel-modal-overlay.show{display:flex}
.sel-modal{background:var(--s1);border:1px solid var(--b2);border-radius:8px;padding:20px 24px;max-width:700px;width:100%;max-height:85vh;display:flex;flex-direction:column;position:relative}
.sel-modal-title{font-family:var(--disp);font-size:16px;font-weight:700;margin-bottom:4px}
.sel-modal-sub{font-size:10px;color:var(--muted);margin-bottom:14px}
.sel-list{flex:1;overflow-y:auto;border:1px solid var(--b2);border-radius:5px;margin-bottom:14px}
.sel-item{display:flex;align-items:center;gap:10px;padding:7px 12px;border-bottom:1px solid var(--b);cursor:pointer;transition:background .1s}
.sel-item:last-child{border-bottom:none}
.sel-item:hover{background:var(--s2)}
.sel-item input[type=checkbox]{width:13px;height:13px;accent-color:var(--green);cursor:pointer;flex-shrink:0}
.sel-item-info{flex:1}
.sel-item-sym{font-weight:600;font-size:12px}
.sel-item-meta{font-size:10px;color:var(--muted)}
.sel-footer{display:flex;align-items:center;justify-content:space-between;gap:10px}
.sel-count{font-size:11px;color:var(--muted)}
/* UPDATE DETAIL TABLE */
.upd-tbl{width:100%;border-collapse:collapse;font-size:11px;margin-top:8px}
.upd-tbl th{font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding:5px 8px;border-bottom:1px solid var(--b2);text-align:left;background:var(--s2)}
.upd-tbl td{padding:5px 8px;border-bottom:1px solid var(--b);vertical-align:middle}
.upd-tbl tr:last-child td{border-bottom:none}
.upd-tbl tr:hover td{background:var(--s2)}
</style>
</head>
<body>
<header>
  <div>
    <div class="logo" id="logo-txt">MULTI-ASSET <em style="color:var(--green)">SCANNER</em></div>
    <div style="font-size:9px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase">Crypto · Memecoins · Stocks · ETFs · Free</div>
  </div>
  <div style="display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted)">
    <span class="live-dot" style="color:var(--green)"></span>
    CoinGecko + Yahoo Finance · No API cost
  </div>
</header>

<div class="asset-tabs">
  <button class="atab active" id="atab-crypto" onclick="switchAsset('crypto')">₿ Crypto</button>
  <button class="atab" id="atab-meme"   onclick="switchAsset('meme')">🐸 Memecoins</button>
  <button class="atab" id="atab-stocks" onclick="switchAsset('stocks')">📈 Stocks</button>
  <button class="atab" id="atab-etf"    onclick="switchAsset('etf')">📊 ETFs / Index</button>
</div>

<div class="regime-banner" id="regime-banner">
  <div>
    <div style="font-family:var(--disp);font-size:12px;font-weight:600" id="reg-label">—</div>
    <div style="color:var(--muted);font-size:10px" id="reg-detail">—</div>
  </div>
  <div style="text-align:right;font-size:10px" id="reg-ref">—</div>
</div>

<!-- PANES -->
<div id="pane-crypto" class="container"></div>
<div id="pane-meme"   class="container" style="display:none"></div>
<div id="pane-stocks" class="container" style="display:none"></div>
<div id="pane-etf"    class="container" style="display:none"></div>

<!-- TOKEN SELECTION MODAL -->
<div class="sel-modal-overlay" id="sel-overlay" onclick="if(event.target===this)closeSel()">
  <div class="sel-modal">
    <div class="sel-modal-title">🧪 Save Test — Select Tokens</div>
    <div class="sel-modal-sub" id="sel-sub">Choose which tokens to track. Entry prices are saved today. Come back any day and click "Update Prices" to add a new price column to the spreadsheet.</div>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <button class="scan-btn" style="font-size:10px;padding:4px 10px;background:var(--s3);color:var(--text);border:1px solid var(--b2)" onclick="selAll(true)">Select all BUY</button>
      <button class="scan-btn" style="font-size:10px;padding:4px 10px;background:var(--s3);color:var(--text);border:1px solid var(--b2)" onclick="selAll(false)">Clear all</button>
      <input type="text" id="sel-search" placeholder="Filter by ticker…" style="background:var(--s2);border:1px solid var(--b2);border-radius:4px;color:var(--text);font-family:var(--mono);font-size:11px;padding:4px 8px;outline:none;flex:1" oninput="filterSelList()">
    </div>
    <div class="sel-list" id="sel-list"></div>
    <div class="sel-footer">
      <div class="sel-count" id="sel-count">0 selected</div>
      <div style="display:flex;gap:8px">
        <button class="scan-btn" style="background:var(--s3);color:var(--text);border:1px solid var(--b2);font-size:11px;padding:6px 14px" onclick="closeSel()">Cancel</button>
        <button class="scan-btn" style="background:var(--amber);color:#000;font-size:11px;padding:6px 18px;font-weight:700" onclick="confirmSaveTest()" id="sel-save-btn">💾 Save Test</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="moverlay" onclick="if(event.target===this)closeM()">
  <div class="modal"><button class="modal-x" onclick="closeM()">×</button><div id="mcontent"></div></div>

function buildPaneHTML(asset) {
  const isCG = asset==='crypto'||asset==='meme';
  const col = COLORS[asset];
  const scanLabel = {crypto:'Scan Crypto (~4000)',meme:'Scan Memecoins',stocks:'Scan Stocks (522)',etf:'Scan ETFs (175)'}[asset];
  const ph = {crypto:'NKN, SOL, PEPE…',meme:'PEPE, DOGE, SHIB…',stocks:'AAPL, TSLA, NVDA…',etf:'SPY, QQQ, ARKK…'}[asset];

  let extraFilters = '';
  if(asset==='crypto') {
    extraFilters = `
      <div class="fg"><div class="fl">Min liveness</div><select id="f-lv-${asset}"><option value="0">Any</option><option value="4">4+</option><option value="6" selected>6+</option><option value="8">8+</option></select></div>
      <div class="fg"><div class="fl">Pages</div><select id="f-pg-${asset}"><option value="4">~1000</option><option value="8" selected>~2000</option><option value="12">~3000</option><option value="16">~4000</option></select></div>`;
  }
  const defDrop = {crypto:'60',meme:'70',stocks:'30',etf:'15'}[asset];
  const defVol  = {crypto:'100000',meme:'50000',stocks:'500000',etf:'50000'}[asset];
  const dropOpts = asset==='etf'
    ? '<option value="5">5%+</option><option value="10" selected>10%+</option><option value="15">15%+</option><option value="20">20%+</option><option value="30">30%+</option>'
    : asset==='stocks'
    ? '<option value="10">10%+</option><option value="15" selected>15%+</option><option value="20">20%+</option><option value="30">30%+</option><option value="40">40%+</option>'
    : asset==='meme'
    ? '<option value="60">60%+</option><option value="70" selected>70%+</option><option value="80">80%+</option><option value="90">90%+</option>'
    : '<option value="50">50%+</option><option value="60" selected>60%+</option><option value="70">70%+</option><option value="80">80%+</option>';
  const volOpts = asset==='stocks'
    ? '<option value="50000">50K+</option><option value="100000" selected>100K+</option><option value="500000">500K+</option><option value="1000000">1M+</option>'
    : asset==='etf'
    ? '<option value="10000">10K+</option><option value="50000" selected>50K+</option><option value="100000">100K+</option>'
    : asset==='meme'
    ? '<option value="10000">$10K+</option><option value="50000" selected>$50K+</option><option value="100000">$100K+</option>'
    : '<option value="50000">$50K+</option><option value="100000" selected>$100K+</option><option value="500000">$500K+</option>';

  return `
    <div class="tab-bar">
      <button class="ptab active" onclick="switchPane('${asset}','scan')">Scan</button>
      <button class="ptab" onclick="switchPane('${asset}','rtt')" id="rtt-tab-${asset}">Ready to Trade <span class="ptab-badge" id="rtt-badge-${asset}">0</span></button>
      <button class="ptab" onclick="switchPane('${asset}','snap')" id="snap-tab-${asset}">Test Tracker <span class="ptab-badge" id="snap-badge-${asset}">0</span></button>
    </div>
    <div id="sp-${asset}">
      <div class="search-bar">
        <div class="fg" style="flex:1;max-width:250px"><div class="fl">⚡ Quick lookup — no scan needed</div>
          <input class="search-input" type="text" id="si-${asset}" placeholder="${ph}" onkeydown="if(event.key==='Enter')quickSearch('${asset}')">
        </div>
        <button class="scan-btn" style="background:var(--s3);color:var(--text);border:1px solid var(--b2)" onclick="quickSearch('${asset}')" id="srchbtn-${asset}">Search</button>
        <div id="ss-${asset}" style="font-size:11px;color:var(--muted);align-self:center"></div>
      </div>
      <div class="top-bar">
        <button class="scan-btn" id="scanbtn-${asset}" onclick="startScan('${asset}')" style="background:${col};color:${asset==='meme'||asset==='etf'?'#fff':'#000'}">▶ ${scanLabel}</button>
        <button class="stop-btn" id="stopbtn-${asset}" onclick="stopScan('${asset}')">■ Stop</button>
        <div class="fg"><div class="fl">${isCG?'ATH drop':'52w drop'}</div><select id="f-ath-${asset}">${dropOpts}</select></div>
        <div class="fg"><div class="fl">Min volume</div><select id="f-vol-${asset}">${volOpts}</select></div>
        ${extraFilters}
        <div class="fg"><div class="fl">Show only</div>
          <select id="f-show-${asset}" onchange="renderTable('${asset}')">
            <option value="">All results</option>
            <option value="BUY">Buy signals</option>
            <option value="ACCUMULATE">Accumulate+</option>
            ${isCG?'<option value="wb">Webull tradable</option><option value="bn">Binance listed</option>':''}
          </select>
        </div>
        <button class="scan-btn" id="inline-save-btn-${asset}" onclick="saveInlineSelected('${asset}')" disabled style="background:var(--amber);color:#000;opacity:0.4;font-size:11px;padding:7px 14px">💾 Save Selected</button>

// ── REGIME ──
async function fetchRegime() {
  try {
    const [br, sr] = await Promise.all([
      fetch('https://api.coingecko.com/api/v3/coins/bitcoin?localization=false&tickers=false&market_data=true&community_data=false&developer_data=false'),
      fetch(`https://corsproxy.io/?${encodeURIComponent('https://query2.finance.yahoo.com/v8/finance/chart/SPY?interval=1d&range=3mo')}`,{signal:AbortSignal.timeout(8000)}).catch(()=>null)
    ]);
    if(br.ok){const d=await br.json();btcData={c7:d.market_data.price_change_percentage_7d||0,c30:d.market_data.price_change_percentage_30d||0};}
    if(sr&&sr.ok){const d=await sr.json();const m=d.chart?.result?.[0];if(m){const cl=m.indicators.quote[0].close.filter(Boolean);const n=cl.length;spyData={c7:n>7?(cl[n-1]-cl[n-7])/cl[n-7]*100:0,c30:n>30?(cl[n-1]-cl[n-30])/cl[n-30]*100:0,price:m.meta.regularMarketPrice};}}
  }catch(e){}
  updateRegimeBanner(curAsset);
}

function getRegime(asset) {
  const isCG = asset==='crypto'||asset==='meme';
  const d = isCG?btcData:spyData;
  if(!d) return {label:'Unknown',detail:'',color:'var(--muted)',adj:0,ref:''};
  const {c7=0,c30=0} = d;
  if(c30>20&&c7>5)  return {label:'Bull expansion',   detail:'Most favorable — bounces most reliable',  color:'var(--green)', adj:+10,ref:(isCG?'BTC':'SPY')+`: ${c7>=0?'+':''}${c7.toFixed(1)}% 7d / ${c30>=0?'+':''}${c30.toFixed(1)}% 30d`};
  if(c7>5)          return {label:'Bull pullback',     detail:'Temporary dip — good entry window',       color:'var(--green)', adj:+6, ref:(isCG?'BTC':'SPY')+`: ${c7>=0?'+':''}${c7.toFixed(1)}% 7d / ${c30>=0?'+':''}${c30.toFixed(1)}% 30d`};
  if(c7>-3)         return {label:'Ranging / chop',   detail:'Less predictable — be selective',         color:'var(--amber)', adj:0,  ref:(isCG?'BTC':'SPY')+`: ${c7>=0?'+':''}${c7.toFixed(1)}% 7d`};
  if(c7<-15)        return {label:'Market panic',      detail:'High false-positive risk — avoid entries',color:'var(--red)',   adj:-18,ref:(isCG?'BTC':'SPY')+`: ${c7.toFixed(1)}% 7d`};
  return              {label:'Correction',            detail:'Wait for base asset to stabilise',        color:'var(--amber)', adj:-8, ref:(isCG?'BTC':'SPY')+`: ${c7.toFixed(1)}% 7d`};
}

function updateRegimeBanner(asset) {
  const r = getRegime(asset);

// ── CRYPTO SCORING HELPERS ──
function supRisk(c) {
  const circ=c.circulating_supply||0,tot=c.total_supply||circ,mx=c.max_supply||tot;
  if(!circ||!tot)return{score:0,label:'N/A',cls:'tm',note:'No supply data'};
  const lk=Math.max((tot-circ)/tot,mx>0?(mx-circ)/mx*0.7:0);
  if(lk>0.55)return{score:3,label:'HIGH',cls:'tr2',note:`${(lk*100).toFixed(0)}% supply not yet circulating`};
  if(lk>0.35)return{score:2,label:'MED', cls:'ta', note:`${(lk*100).toFixed(0)}% locked supply`};
  if(lk>0.15)return{score:1,label:'LOW', cls:'tb', note:`${(lk*100).toFixed(0)}% locked supply`};
  return{score:0,label:'CLEAR',cls:'tg',note:'Most supply in circulation'};
}
function diScore(c,wb) {
  let sc=10,iss=[];
  const lq=(c.total_volume||0)/(c.market_cap||1);
  if(lq>1.5){iss.push('Volume exceeds mcap — possible wash trading');sc-=4;}
  else if(lq>0.8){iss.push('Very high vol/mcap');sc-=2;}
  if(!wb&&(c.total_volume||0)<200000){iss.push('No major exchange listing');sc-=3;}
  if(wb&&!wb.on_bn_global&&!wb.on_coinbase){iss.push('Not on Binance/Coinbase');sc-=2;}
  sc=Math.max(1,sc);
  return{score:sc,label:sc>=8?'HIGH':sc>=5?'MED':'LOW',cls:sc>=8?'tg':sc>=5?'ta':'tr2',issues:iss};
}
function relStr(c7coin,refC7) {
  if(refC7===null||refC7===undefined)return null;
  const d=(c7coin||0)-(refC7||0);
  if(d>8) return{label:'↑ Strong',cls:'tg',note:`+${d.toFixed(1)}% vs ref`};
  if(d>2) return{label:'↑ Mild',  cls:'tb',note:`+${d.toFixed(1)}% vs ref`};
  if(d>-5)return{label:'~ Inline',cls:'tm',note:`${d.toFixed(1)}% vs ref`};
  if(d>-15)return{label:'↓ Weak', cls:'ta',note:`${d.toFixed(1)}% vs ref`};
  return    {label:'↓↓ Bad',      cls:'tr2',note:`${d.toFixed(1)}% vs ref`};
}
function athAge(c) {
  if(!c.ath_date)return null;
  const days=Math.floor((Date.now()-new Date(c.ath_date))/(864e5));
  if(days<90) return{label:days+'d', cls:'tr2',note:'Recent ATH — may keep falling'};
  if(days<365)return{label:Math.floor(days/30)+'mo',cls:'ta',note:'ATH within last year'};
  return{label:(days/365).toFixed(1)+'y',cls:'tg',note:'Old ATH — more likely bottomed'};
}

  if(atlGainPct > 50000) return {label:'Launch price',note:`ATL was likely the initial listing price — coin has risen ${Math.round(atlGainPct).toLocaleString()}% from all-time low`,icon:'🪄',cls:'tg'};

function inferSec(sym,name) {
  const s=(sym+' '+name).toLowerCase();
  if(/(btc|eth|sol|bnb|ada|dot|avax|atom|near|icp|algo|ftm|apt|sui|sei|tia|inj|trx|xrp|xlm|vet)/.test(s))return'L1/L2';
  if(/ai|gpt|data|oracle|fetch|agix|ocean|rndr|render|grt/.test(s))return'AI/Data';
  if(/game|nft|meta|play|axie|sand|mana|enjin|imx|gala|magic|pixel/.test(s))return'Gaming';
  if(/doge|shib|pepe|floki|meme|bonk|wif|bome|turbo|inu|elon|baby/.test(s))return'Meme';
  if(/uni|aave|curve|maker|compound|yearn|sushi|lido|ldo|gmx|perp|snx|dydx/.test(s))return'DeFi';
  return'Altcoin';
}

function scoreCG(coin, wb, asset) {
  const vol=coin.total_volume||0,mcap=coin.market_cap||1;
  const athDrop=Math.abs(coin.ath_change_percentage||0);
  const c24=coin.price_change_percentage_24h||0;
  const c7=coin.price_change_percentage_7d_in_currency||0;
  const c14=coin.price_change_percentage_14d_in_currency||0;
  const c30=coin.price_change_percentage_30d_in_currency||0;
  const liq=vol/mcap;
  const isMeme=asset==='meme';
  // 5-day from sparkline (168 hourly prices = 7 days; 120 back = 5 days ago)
  const _sp=coin.sparkline_in_7d?.price||[];
  const c5d=_sp.length>=121?((_sp[_sp.length-1]-_sp[_sp.length-121])/_sp[_sp.length-121]*100):c7*(5/7);

  let os=0;
  if(athDrop>=60&&athDrop<=90)os+=3;else if(athDrop>=50)os+=1;else if(athDrop>90)os+=1;
  if(c7<=-20)os+=2;else if(c7<=-10)os+=1;
  if(c24<=-8)os+=1;
  if(liq>0.05)os+=1;if(liq>0.15)os+=1;
  if(vol>500000)os+=1;
  os=Math.min(os,10);

  let lv=0;
  if(vol>5e6)lv+=3;else if(vol>1e6)lv+=2;else if(vol>100000)lv+=1;
  if(mcap>5e8)lv+=3;else if(mcap>5e7)lv+=2;else if(mcap>5e6)lv+=1;
  if(wb){if(wb.on_bn_global)lv+=2;else if(wb.on_coinbase)lv+=1;if(wb.wb_tradable)lv+=1;}
  else if(vol>1e6)lv+=1;
  lv=Math.min(lv,10);

  let br=0;
  if(c7>c30/4)br+=2;if(c24>c7/7)br+=2;if(c14>c30/2)br+=1;
  if(liq>0.15)br+=2;else if(liq>0.07)br+=1;
  if(athDrop>=65&&athDrop<=88)br+=2;else if(athDrop>=55)br+=1;
  br=Math.min(br,10);

  const composite=Math.round(os*0.30+lv*0.40+br*0.30);
  const sector=wb?.category||inferSec(coin.symbol||'',coin.name||'');
  const sr=supRisk(coin);
  const di=diScore(coin,wb);
  const rs=relStr(c7,btcData?.c7);
  const aa=athAge(coin);
  const reg=getRegime(asset);
  let prob=25+(composite*5.5)+reg.adj;
  if(sr.score===3)prob-=18;else if(sr.score===2)prob-=8;
  if(di.score<5)prob-=12;else if(di.score<8)prob-=4;
  if(rs){if(rs.label.includes('Strong'))prob+=8;else if(rs.label.includes('↓↓'))prob-=8;}
  if(aa?.cls==='tr2')prob-=8;if(aa?.cls==='tg')prob+=4;
  prob=Math.max(10,Math.min(85,Math.round(prob)));
  let conf,cc;
  if(lv>=7&&di.score>=8){conf='High';cc='tg';}
  else if(lv>=5&&di.score>=5){conf='Med';cc='ta';}
  else{conf='Low';cc='tr2';}
  let action,ac;
  if(prob>=65&&conf!=='Low'&&sr.score<3){action='BUY';ac='tg';}
  else if(prob>=50){action='ACCUMULATE';ac='tb';}
  else if(prob>=35){action='WAIT';ac='ta';}
  else{action='AVOID';ac='tr2';}
  if(sr.score===3&&action==='BUY'){action='WAIT';ac='ta';}
  const athCatalyst=inferATHCatalyst(coin);
  const athPrice=coin.ath||0;
  const atlCatalyst=inferATLCatalyst(coin);
  const atlPrice=coin.atl||0;
  const atlGain=coin.atl_change_percentage||0; // % above ATL
  return{os,lv,br,composite,sector,sr,di,rs,aa,athCatalyst,athPrice,atlCatalyst,atlPrice,atlGain,prob,conf,cc,action,ac,
    athDrop,vol,mcap,liq,c24,c5d,c7,c14,c30,asset};
}

// ── STOCK / ETF SCORING ──
function scoreYahoo(d, asset) {
  const{ticker,name,price,hi52,lo52,vol,avgVol,mcap,c1d,c5d,c1mo,c3mo,sector}=d;
  const drop=(hi52>0?(hi52-price)/hi52*100:0);
  const isETF=asset==='etf';
  const sweetLo=isETF?15:25, sweetHi=isETF?40:65;
  let os=0;
  if(drop>=sweetLo&&drop<=sweetHi)os+=3;else if(drop>=sweetLo*0.7)os+=1;else if(drop>sweetHi*1.3)os+=1;
  if(c1mo<=(isETF?-10:-15))os+=2;else if(c1mo<=(isETF?-5:-8))os+=1;
  if(c5d<=-5)os+=1;
  if(vol>avgVol*1.5)os+=2;else if(vol>avgVol)os+=1;
  os=Math.min(os,10);
  let lv=0;
  if(mcap>1e11)lv+=3;else if(mcap>1e10)lv+=2;else if(mcap>5e8)lv+=1;
  if(avgVol>5e6)lv+=3;else if(avgVol>1e6)lv+=2;else if(avgVol>1e5)lv+=1;
  if(price>5)lv+=2;else if(price>1)lv+=1;
  if(isETF)lv+=2; // ETFs never die
  lv=Math.min(lv,10);
  let br=0;
  if(c5d>c1mo/4)br+=3;
  if(c1d>c5d/5)br+=2;
  if(price>lo52*1.03)br+=2;
  if(drop>=sweetLo&&drop<=sweetHi)br+=2;
  br=Math.min(br,10);
  const composite=Math.round(os*(isETF?0.25:0.30)+lv*0.40+br*(isETF?0.35:0.30));
  const rs=relStr(c5d, spyData?.c7);
  const reg=getRegime(asset);
  let prob=(isETF?30:25)+(composite*5.5)+reg.adj;
  if(rs){if(rs.label.includes('Strong'))prob+=7;else if(rs.label.includes('↓↓'))prob-=10;}
  if(lv<4)prob-=10;
  prob=Math.max(10,Math.min(85,Math.round(prob)));
  let conf,cc;
  if(lv>=7){conf='High';cc='tg';}
  else if(lv>=5){conf='Med';cc='ta';}
  else{conf='Low';cc='tr2';}
  let action,ac;
  if(prob>=65&&conf!=='Low'){action='BUY';ac='tg';}
  else if(prob>=50){action='ACCUMULATE';ac='tb';}
  else if(prob>=35){action='WAIT';ac='ta';}
  else{action='AVOID';ac='tr2';}
  return{...d,os,lv,br,composite,sector:sector||'—',rs,prob,conf,cc,action,ac,drop52:drop,asset};
}

// ── YAHOO FETCH ──
// Yahoo Finance blocks direct browser requests (CORS) — we use a proxy chain
const YF_PROXIES=[
  t=>`https://corsproxy.io/?${encodeURIComponent('https://query2.finance.yahoo.com/v8/finance/chart/'+t+'?interval=1d&range=1y&includePrePost=false')}`,
  t=>`https://api.allorigins.win/raw?url=${encodeURIComponent('https://query2.finance.yahoo.com/v8/finance/chart/'+t+'?interval=1d&range=1y&includePrePost=false')}`,
  t=>`https://query1.finance.yahoo.com/v8/finance/chart/${t}?interval=1d&range=1y&includePrePost=false`,
];
async function fetchYahoo(ticker) {
  for(const makeUrl of YF_PROXIES){
    try{
      const r=await fetch(makeUrl(ticker),{signal:AbortSignal.timeout(12000)});
      if(!r.ok)continue;
      const d=await r.json();
      const res=d.chart?.result?.[0];if(!res)continue;
      const m=res.meta;
      const cl=(res.indicators?.quote?.[0]?.close||[]).filter(v=>v!=null);
      const vo=(res.indicators?.quote?.[0]?.volume||[]).filter(v=>v!=null);
      const n=cl.length;if(n<5)continue;
      const price=m.regularMarketPrice||cl[n-1];
      const avgVol=vo.length>20?vo.slice(-20).reduce((a,b)=>a+b,0)/20:(vo[vo.length-1]||0);
      return{ticker,name:m.shortName||ticker,price,
        hi52:m.fiftyTwoWeekHigh||Math.max(...cl),
        lo52:m.fiftyTwoWeekLow||Math.min(...cl),
        vol:m.regularMarketVolume||vo[vo.length-1]||0,
        avgVol,mcap:m.marketCap||0,
        c1d:m.regularMarketChangePercent||0,
        c5d:n>5?(cl[n-1]-cl[n-5])/cl[n-5]*100:0,
        c1mo:n>22?(cl[n-1]-cl[n-22])/cl[n-22]*100:0,
        c3mo:n>66?(cl[n-1]-cl[n-66])/cl[n-66]*100:0,
        sector:m.sector||''};
    }catch(e){continue;}
  }
  return null;
}

// ── SCAN ENGINES ──
async function startScan(asset) {
  if(active[asset])return;
  active[asset]=true;aborted[asset]=false;results[asset]=[];
  const btn=document.getElementById('scanbtn-'+asset);
  btn.disabled=true;
  document.getElementById('stopbtn-'+asset).style.display='inline-block';
  document.getElementById('prog-'+asset).classList.add('show');
  setS(asset,'Fetching market regime...',2);
  if(!btcData&&!spyData)await fetchRegime();
  else if((asset==='stocks'||asset==='etf')&&!spyData)await fetchRegime();
  else if((asset==='crypto'||asset==='meme')&&!btcData)await fetchRegime();
  updateRegimeBanner(asset);
  const isCG=asset==='crypto'||asset==='meme';
  if(isCG)await scanCG(asset);else await scanYF(asset);
  active[asset]=false;btn.disabled=false;btn.textContent='↻ Rescan';
  document.getElementById('stopbtn-'+asset).style.display='none';
  renderTable(asset);renderMetrics(asset);
}

function stopScan(asset){
  aborted[asset]=true;active[asset]=false;
  document.getElementById('scanbtn-'+asset).disabled=false;
  document.getElementById('stopbtn-'+asset).style.display='none';
  setS(asset,`Stopped — ${results[asset].length} found.`,100);
  renderTable(asset);renderMetrics(asset);
}

async function scanCG(asset) {
  const minAth=parseInt(document.getElementById('f-ath-'+asset).value);
  const minVol=parseInt(document.getElementById('f-vol-'+asset).value);
  const minLv=parseInt(document.getElementById('f-lv-crypto')?.value||0);
  const pages=parseInt(document.getElementById('f-pg-crypto')?.value||8);
  const isMeme=asset==='meme';
  const maxP=isMeme?4:pages;
  let fetched=0,found=0;
  for(let p=1;p<=maxP;p++){
    if(aborted[asset])break;
    setS(asset,`Page ${p}/${maxP} — ${found} qualified...`,((p-1)/maxP)*90);
    try{
      let url=`https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=250&page=${p}&sparkline=true&price_change_percentage=7d,14d,30d`;
      if(isMeme)url+='&category=meme-token';
      const r=await fetch(url);
      if(!r.ok){if(r.status===429){setS(asset,'Rate limited — waiting 65s...',0);await sleep(66000);p--;continue;}break;}
      const coins=await r.json();if(!coins.length)break;
      fetched+=coins.length;
      for(const c of coins){
        if(aborted[asset])break;
        if(isStable(c))continue;
        if((c.total_volume||0)<minVol||Math.abs(c.ath_change_percentage||0)<minAth||(c.market_cap||0)<500000)continue;
        const wb=WB_MAP[c.symbol?.toUpperCase()]||null;
        const sc=scoreCG(c,wb,asset);
        if(!isMeme&&sc.lv<minLv)continue;
        results[asset].push({coin:c,wb,...sc});found++;
      }
      renderTable(asset);renderMetrics(asset);
    }catch(e){setS(asset,`Error: ${e.message} — retrying...`,0);await sleep(5000);p--;}
    if(p<maxP&&!aborted[asset])await sleep(1400);
  }
  setS(asset,`Done — ${found} tokens found from ${fetched} scanned.`,100);
}

async function scanYF(asset) {
  const tickers=asset==='stocks'?SP500_TICKERS:ETF_TICKERS;
  const minDrop=parseInt(document.getElementById('f-ath-'+asset).value);
  const minVol=parseInt(document.getElementById('f-vol-'+asset).value);
  const total=tickers.length;const BS=8; // smaller batches — proxy needs breathing room
  let done=0;
  // Test connection first so user gets clear feedback if proxy is down
  setS(asset,'Testing Yahoo Finance connection via CORS proxy...',2);
  const testResult=await fetchYahoo('SPY');
  if(!testResult){
    setS(asset,'⚠ Yahoo Finance unavailable via proxy. corsproxy.io may be overloaded — wait 30s and try again, or try a different network.',0);
    document.getElementById('scanbtn-'+asset).disabled=false;
    active[asset]=false;
    document.getElementById('stopbtn-'+asset).style.display='none';
    return;
  }
  setS(asset,`Connection OK (${asset==='stocks'?total+' S&P/Nasdaq stocks':total+' ETFs'} to scan) — starting...`,5);
  for(let i=0;i<total;i+=BS){
    if(aborted[asset])break;
    setS(asset,`Scanning ${i}/${total} — ${results[asset].length} qualified...`,i/total*90);
    const batch=tickers.slice(i,i+BS);
    const batchRes=await Promise.all(batch.map(t=>fetchYahoo(t).catch(()=>null)));
    for(const d of batchRes){
      if(!d)continue;
      const drop=d.hi52>0?(d.hi52-d.price)/d.hi52*100:0;
      if(drop<minDrop||(d.avgVol||d.vol)<minVol||d.price<0.5)continue;
      results[asset].push(scoreYahoo(d,asset));
    }
    done+=batch.length;
    renderTable(asset);renderMetrics(asset);
    if(i+BS<total&&!aborted[asset])await sleep(600); // proxy breathing room
  }
  setS(asset,`Done — ${results[asset].length} found from ${done} tickers.`,100);
}

    if(isCG){

      const sd=await sr.json();
      const coins=sd.coins||[];

      const mr=await fetch(`https://api.coingecko.com/api/v3/coins/${match.id}?localization=false&tickers=false&market_data=true&community_data=false&developer_data=false`);
      const md=await mr.json();const mdd=md.market_data;
      const coin={id:match.id,symbol:md.symbol?.toUpperCase(),name:md.name,
        current_price:mdd.current_price?.usd,market_cap:mdd.market_cap?.usd,
        market_cap_rank:md.market_cap_rank,total_volume:mdd.total_volume?.usd,
        price_change_percentage_24h:mdd.price_change_percentage_24h,
        price_change_percentage_7d_in_currency:mdd.price_change_percentage_7d,
        price_change_percentage_14d_in_currency:mdd.price_change_percentage_14d,
        price_change_percentage_30d_in_currency:mdd.price_change_percentage_30d,
        ath:mdd.ath?.usd,ath_change_percentage:mdd.ath_change_percentage?.usd,
        ath_date:mdd.ath_date?.usd,circulating_supply:mdd.circulating_supply,
        total_supply:mdd.total_supply,max_supply:mdd.max_supply};
      const wb=WB_MAP[coin.symbol?.toUpperCase()]||null;
      const sc=scoreCG(coin,wb,asset);
      const result={coin,wb,...sc};
      const ei=results[asset].findIndex(r=>r.coin?.symbol?.toUpperCase()===coin.symbol?.toUpperCase());
      if(ei>=0)results[asset][ei]=result;else results[asset].unshift(result);

      ssel.style.color=sc.action==='BUY'?'var(--green)':'var(--muted)';
      openModal(result,asset);
    }else{
      const d=await fetchYahoo(raw);
      if(!d){ssel.textContent=`"${raw}" not found on Yahoo Finance.`;btn.disabled=false;return;}
      const sc=scoreYahoo(d,asset);
      const ei=results[asset].findIndex(r=>r.ticker===raw);

      ssel.textContent=`${d.name} — ${sc.prob}% · ${sc.action}`;

  btn.disabled=false;
}

function getCols(asset) {
  const isCG=asset==='crypto'||asset==='meme';
  const base=[['☑','chk'],['Ticker','sym'],['Name','name'],['Sector','sector'],['Price','price'],
    ['1d%','c24'],['5d%','c5d'],['7d%','c7'],['From peak','ath']];
  if(isCG)return[...base,['ATH $','athprice'],['ATH Catalyst','athcat'],['ATH age','age'],['ATL $','atlprice'],['ATL Catalyst','atlcat'],['↑ from ATL','atlgain'],['Vol','vol'],['Supply','sr'],['DInt','di'],['Live','lv'],['Score','composite'],['Prob','prob'],['Conf','conf'],['Venue','exch'],['Action','action']];
  return[...base,['Avg vol','avgvol'],['Mkt cap','mcap'],['Live','lv'],['Score','composite'],['Prob','prob'],['Conf','conf'],['Action','action']];
}

function renderTable(asset) {
  const fv=document.getElementById('f-show-'+asset)?.value||'';
  const ss=sortS[asset];
  const isCG=asset==='crypto'||asset==='meme';
  let rows=[...results[asset]];
  if(fv==='BUY')rows=rows.filter(r=>r.action==='BUY');
  else if(fv==='ACCUMULATE')rows=rows.filter(r=>r.prob>=50);
  else if(fv==='wb')rows=rows.filter(r=>r.wb?.wb_tradable);
  else if(fv==='bn')rows=rows.filter(r=>r.wb?.on_bn_global);

  const d=ss.dir;
  rows.sort((a,b)=>{
    const k=ss.col;
    if(k==='sym')return d*(gSym(a).localeCompare(gSym(b)));
    if(k==='name')return d*(gName(a).localeCompare(gName(b)));
    if(k==='sector')return d*((a.sector||'').localeCompare(b.sector||''));
    if(k==='price')return d*(gPrice(b)-gPrice(a));
    if(k==='c24')return d*((b.c24||b.c1d||0)-(a.c24||a.c1d||0));
    if(k==='c5d')return d*((b.c5d||0)-(a.c5d||0));
    if(k==='c7')return d*((b.c7||b.c5d||0)-(a.c7||a.c5d||0));
    if(k==='athprice')return d*((b.athPrice||0)-(a.athPrice||0));
    if(k==='athcat')return d*((a.athCatalyst?.label||'').localeCompare(b.athCatalyst?.label||''));
    if(k==='ath')return d*((b.athDrop||b.drop52||0)-(a.athDrop||a.drop52||0));
    if(k==='age'){const ga=a.aa,gb=b.aa;if(!ga&&!gb)return 0;if(!ga)return d;if(!gb)return-d;return d*((ga.cls==='tg'?1:ga.cls==='ta'?0:-1)-(gb.cls==='tg'?1:gb.cls==='ta'?0:-1));}
    if(k==='atlprice')return d*((a.atlPrice||0)-(b.atlPrice||0));
    if(k==='atlcat')return d*((a.atlCatalyst?.label||'').localeCompare(b.atlCatalyst?.label||''));
    if(k==='atlgain')return d*((b.atlGain||0)-(a.atlGain||0));
    if(k==='vol')return d*((b.vol||0)-(a.vol||0));
    if(k==='avgvol')return d*((b.avgVol||0)-(a.avgVol||0));
    if(k==='mcap')return d*((b.mcap||0)-(a.mcap||0));
    if(k==='sr')return d*((a.sr?.score||0)-(b.sr?.score||0));
    if(k==='di')return d*((b.di?.score||0)-(a.di?.score||0));
    if(k==='lv')return d*(b.lv-a.lv);
    if(k==='composite')return d*(b.composite-a.composite);
    if(k==='prob')return d*(b.prob-a.prob);
    if(k==='action')return d*(['BUY','ACCUMULATE','WAIT','AVOID'].indexOf(a.action)-['BUY','ACCUMULATE','WAIT','AVOID'].indexOf(b.action));
    return d*(b.composite-a.composite);
  });

  if(!rows.length){document.getElementById('results-'+asset).innerHTML='<div class="results-card"><div class="empty-state">No results. Adjust filters or run scan.</div></div>';return;}
  const cols=getCols(asset);
  let html=`<div style="font-size:10px;color:var(--muted);margin-bottom:5px">${rows.length} results · click headers to sort · click rows for full analysis</div>
  <div class="results-card"><div class="tbl-wrap"><table><thead><tr>
  ${cols.map(([lbl,key])=>`<th onclick="colSort('${asset}','${key}')">${lbl}<span style="color:${ss.col===key?'var(--green)':'var(--mu2)'};font-size:8px"> ${ss.col===key?(ss.dir===-1?'↓':'↑'):'↕'}</span></th>`).join('')}
  </tr></thead><tbody>`;

  for(const r of rows){
    const sym=gSym(r),name=gName(r),price=gPrice(r);
    const inRTT=rttList[asset].includes(sym);
    const probColor=r.prob>=65?'var(--green)':r.prob>=50?'var(--blue)':r.prob>=35?'var(--amber)':'var(--muted)';

        <td style="font-weight:600;color:${r.composite>=7?'var(--green)':r.composite>=5?'var(--blue)':r.composite>=3?'var(--amber)':'var(--muted)'}">${r.composite}/10</td>

        <td><span class="prob-big" style="color:${probColor}">${r.prob}%</span></td>

      <td onclick="event.stopPropagation()" style="padding:3px 6px">
        <input type="checkbox" ${isChecked?'checked':''} style="width:13px;height:13px;accent-color:var(--green);cursor:pointer"
          onclick="event.stopPropagation();toggleInline('${asset}','${sym}',this)">
      </td>

      <td class="neg">-${drop.toFixed(0)}%</td>

  }
  html+='</tbody></table></div></div>';
  document.getElementById('results-'+asset).innerHTML=html;
}

  let pills='';
  if(isCG){
    const wb=r.wb;

    else if(wb?.wb_watch)pills+=`<span class="epill">Webull (watch)</span>`;

function manualChecks(asset){
  if(asset==='crypto'||asset==='meme')return'Token unlocks (tokenunlocks.app) · On-chain wallets (Nansen) · Funding + OI (Coinglass) · Dev activity (GitHub)';
  if(asset==='stocks')return'Earnings date (Yahoo Finance) · Insider selling (openinsider.com) · Analyst ratings (Finviz) · Short interest';
  return'Fed calendar · VIX level · Sector rotation (SPDR sector ETFs) · Fund flows (etfdb.com)';
}

function genAnalysis(r,asset){
  const sym=gSym(r),price=gPrice(r),drop=r.athDrop||r.drop52||0;
  const c7=r.c7||r.c5d||0,c30=r.c30||r.c1mo||0;
  const isCG=asset==='crypto'||asset==='meme';
  const decel=c7>(c30/4);
  let alive='',why='',prob='',when='';
  if(isCG){
    alive=r.lv>=7?`${sym} shows strong liveness — ${fmtV(r.vol)} daily volume confirms active participation.`:`${sym} has borderline liveness — monitor volume trend carefully.`;
    why=decel?`Decline decelerating: 7d ${c7.toFixed(1)}% vs 30d avg ${(c30/4).toFixed(1)}%/wk — selling may be exhausting.`:`Active decline: 7d ${c7.toFixed(1)}%. Broader market pressure or distribution.`;
    prob=`Bounce probability: ${r.prob}% (${r.conf} confidence). ${r.prob>=65?'Multiple positive signals aligned — staged entry appropriate.':r.prob>=50?'Moderate setup — wait for volume confirmation before full entry.':'Below threshold. Key risks: '+(r.sr?.score>=2?'supply dilution. ':'')+(decel?'':'decline not yet decelerating.')}`;
    when=r.br>=7?`Conditions near. Watch for daily green candle on above-average volume and RSI turning up from below 30.`:r.br>=5?`Monitor for volume expanding above ${fmtV((r.vol||0)*1.4)} for 2+ days.`:`Premature. Wait until 7d decline flattens toward 0%.`;
  }else if(asset==='stocks'){
    alive=r.lv>=7?`${sym} is a liquid established company — ${fmtV(r.avgVol||r.vol)} avg daily volume, ${fmtV(r.mcap)} market cap.`:`Lower liquidity — verify company is still operating normally before entering.`;
    why=decel?`Decline decelerating: 5d ${c7.toFixed(1)}% vs 1mo avg ${(c30/4).toFixed(1)}%/wk — selling pressure reducing.`:`Active decline: ${c7.toFixed(1)}% this week. Could be sector rotation, earnings miss, or market sell-off.`;
    prob=`Bounce probability: ${r.prob}%. ${drop.toFixed(0)}% off 52w high. ${r.prob>=65?'Classic mean-reversion setup with decelerating decline.':r.prob>=50?'Setup building — needs volume confirmation on green days.':'Insufficient signals. Risk outweighs reward.'}`;
    when=`Watch for: price holding above 52w low (${fmtP(r.lo52||0)}), volume expanding on green days, no earnings within next 14 days.`;
  }else{
    alive=`${sym} is a major ETF. Sufficient AUM and liquidity for position entry. ETFs never go to zero.`;
    why=`ETF decline of ${drop.toFixed(0)}% from 52w high reflects underlying index weakness — ${c30.toFixed(1)}% over 30 days. ${decel?'Decline is decelerating — positive early signal.':'Decline active — macro headwinds remain.'}`;
    prob=`Bounce probability: ${r.prob}%. ETF recoveries are reliable but macro-dependent. ${getRegime(asset).adj>=0?'Current market regime is supportive.':'Market regime is a headwind — wait for stabilisation.'}`;
    when=`Key triggers: base market (BTC/SPY) showing recovery, VIX declining, ETF holding above recent swing low, positive sector rotation.`;
  }
  return`<h4 style="color:var(--green)">1. Is it viable?</h4><p>${alive}</p>
<h4 style="color:var(--green)">2. Why is it down?</h4><p>${why}</p>
<h4 style="color:var(--green)">3. Bounce probability</h4><p>${prob}</p>
<h4 style="color:var(--green)">4. When might it bounce?</h4><p>${when}</p>`;
}

function genFailure(r,asset){
  const modes=[];
  const isCG=asset==='crypto'||asset==='meme';
  if(isCG){
    if(r.sr?.score>=2)modes.push(`<strong>Dilution risk:</strong> ${r.sr.note}. Large unlock overwhelms buyers before or during the bounce.`);
    if(r.di?.score<5)modes.push(`<strong>Data quality:</strong> ${r.di?.issues?.[0]||'Volume suspect'}. Exit may be harder than entry.`);
    if(r.aa?.cls==='tr2')modes.push(`<strong>Recent crash:</strong> ATH ${r.aa.label} ago — still in primary decline, bounce premature.`);
  }else if(asset==='stocks'){
    modes.push(`<strong>Earnings risk:</strong> Negative earnings surprise can extend decline 20-40% overnight. Check earnings calendar first.`);
    modes.push(`<strong>Fundamental deterioration:</strong> Rising debt, falling revenue, or negative cash flow can mean the stock deserves to be lower.`);
  }else{
    modes.push(`<strong>Macro regime:</strong> If Fed is hiking or risk appetite is collapsing, ETF bounces fail repeatedly before the real recovery.`);
    modes.push(`<strong>Structural shift:</strong> Thematic ETFs can underperform for years if their narrative permanently reverses.`);
  }
  modes.push(`<strong>Unknown unknowns:</strong> ${manualChecks(asset).split('·')[0]} not visible in this tool.`);
  return`<h4 class="fail" style="color:var(--red)">What can kill this trade</h4><ul style="padding-left:14px;display:flex;flex-direction:column;gap:5px">${modes.map(m=>`<li>${m}</li>`).join('')}</ul>`;
}

function genExec(r,asset){
  const price=gPrice(r),sym=gSym(r);
  const drop=r.athDrop||r.drop52||0;
  const tgt=price*(1+(asset==='etf'?0.12:drop>60?0.35:0.20));
  const stop=price*0.90;
  const isCG=asset==='crypto'||asset==='meme';
  if(r.action==='BUY')return`<h4 style="color:var(--blue)">Entry</h4><p>Enter at <strong>${fmtP(price)}</strong>${isCG?' (mark price)':''}. 3 tranches: 40% now · 30% at ${fmtP(price*0.95)} · 30% at ${fmtP(price*0.90)}.</p>
<h4 style="color:var(--blue)">Target</h4><p><strong>${fmtP(tgt)}</strong> (+${((tgt/price-1)*100).toFixed(0)}%). Take 50% off at halfway.</p>
<h4 style="color:var(--blue)">Stop</h4><p>Hard stop <strong>${fmtP(stop)}</strong> (-10%). Full exit on daily close below this.</p>`;
  if(r.action==='ACCUMULATE')return`<h4 style="color:var(--blue)">Entry</h4><p>Start 25% at ${fmtP(price)}. Add on volume confirmation. Target ${fmtP(tgt)}. Stop ${fmtP(stop)}.</p>`;
  return`<h4 style="color:var(--blue)">No entry yet</h4><p>Set price alert at ${fmtP(price*0.92)}. Revisit when probability reaches 50%+ on next scan.</p>`;
}

async function fetchNews(sym,cgId){
  const el=document.getElementById('mnews');if(!el)return;
  try{
    const r=await fetch(`https://cryptopanic.com/api/free/v1/posts/?auth_token=free&currencies=${sym}&kind=news&public=true`);
    if(!r.ok)throw new Error('unavailable');
    const d=await r.json();const items=(d.results||[]).slice(0,4);
    if(!items.length){el.innerHTML=`<a href="https://cryptopanic.com/news/${sym.toLowerCase()}/" target="_blank" style="color:var(--blue);font-size:11px">CryptoPanic →</a>`;return;}
    el.innerHTML=items.map(item=>{
      const date=new Date(item.published_at).toLocaleDateString();
      const p=item.votes?.positive||0,n=item.votes?.negative||0;
      const s=p>n?'<span class="tag tg" style="font-size:9px">+</span>':n>p?'<span class="tag tr2" style="font-size:9px">−</span>':'<span class="tag tm" style="font-size:9px">~</span>';
      return`<div class="news-item">${s} <a href="${item.url}" target="_blank">${item.title}</a> <span style="color:var(--muted);font-size:10px">· ${date}</span></div>`;
    }).join('')+`<div style="margin-top:5px;font-size:10px"><a href="https://cryptopanic.com/news/${sym.toLowerCase()}/" target="_blank" style="color:var(--blue)">More →</a></div>`;
  }catch(e){if(el)el.innerHTML=`<a href="https://cryptopanic.com/news/${sym.toLowerCase()}/" target="_blank" style="color:var(--blue);font-size:11px">CryptoPanic →</a>`;}
}

function clearInlineSelection(asset) {
  inlineSelected[asset] = new Set();
  renderTable(asset);
  updateInlineSaveBtn(asset);
}

function updateInlineSaveBtn(asset) {
  const n = inlineSelected[asset]?.size||0;
  const btn = document.getElementById('inline-save-btn-'+asset);
  const clr = document.getElementById('inline-clr-btn-'+asset);
  if(btn) {
    btn.textContent = n>0 ? `💾 Save ${n} Selected` : '💾 Save Selected';
    btn.style.opacity = n>0 ? '1' : '0.4';
    btn.disabled = n===0;
  }

function saveInlineSelected(asset) {
  const sel = inlineSelected[asset];
  if(!sel||!sel.size) { alert('Tick at least one checkbox first.'); return; }
  const today = new Date().toISOString().split('T')[0];
  const selected = results[asset].filter(r=>sel.has(gSym(r))).map(r=>({
    sym:    gSym(r),
    name:   gName(r),
    sector: r.sector||'—',
    action: r.action,
    prob:   r.prob,
    lv:     r.lv,
    cgId:   r.coin?.id||null,
    updates:[{date:today, price:gPrice(r), label:'Entry'}]
  }));
  const test = {
    id:      Date.now(),
    name:    `${LABELS[asset]} · ${today}`,
    asset,
    created: today,
    regime:  document.getElementById('reg-label')?.textContent||'—',

}

function toggleRTT(asset,sym,btn){
  if(rttList[asset].includes(sym)){
    rttList[asset]=rttList[asset].filter(s=>s!==sym);
    if(btn){btn.textContent='＋';btn.classList.remove('added');}
  }else{
    rttList[asset].push(sym);
    if(btn){btn.textContent='✓';btn.classList.add('added');}
  }
  const b=document.getElementById('rtt-badge-'+asset);
  if(rttList[asset].length){b.textContent=rttList[asset].length;b.classList.add('show');}else b.classList.remove('show');
  if(!rttList[asset].includes(rttSel[asset]))rttSel[asset]=rttList[asset][0]||null;
  renderRTTPills(asset);
}

function renderRTTPills(asset){
  const el=document.getElementById('rttpills-'+asset);
  if(!rttList[asset].length){
    el.innerHTML='<span style="color:var(--muted);font-size:11px">No candidates — add from scan with ＋</span>';
    document.getElementById('rttdetail-'+asset).innerHTML='<div class="empty-state">Add a candidate to view confirmation checklist.</div>';

  }
  el.innerHTML=rttList[asset].map(sym=>`<button class="rtt-pill ${sym===rttSel[asset]?'active':''}" onclick="selRTT('${asset}','${sym}')">${sym} <span onclick="event.stopPropagation();toggleRTT('${asset}','${sym}');renderRTTPills('${asset}')" style="opacity:.5;margin-left:3px">×</span></button>`).join('');
  if(rttSel[asset])renderRTTDetail(asset,rttSel[asset]);
}

function step(n,lbl,auto,links,chk,extra=''){
  return`<div class="rtt-step">
    <div class="rtt-n">${n}</div>
    <div class="rtt-lbl">${lbl}</div>
    <div class="rtt-auto"><span class="${auto.cls}">${auto.icon} ${auto.text}</span>${extra}</div>
    <div class="rtt-acts">${links}<label class="rtt-chk"><input type="checkbox" onchange="this.parentElement.style.color=this.checked?'var(--green)':'var(--muted)'"> ${chk}</label></div>
  </div>`;}

function buildRTTSteps(r,asset){
  const sym=gSym(r);const cache=rttCache[asset][sym]||{};
  const c7=r.c7||r.c5d||0,c30=r.c30||r.c1mo||0;
  const decel=c7>(c30/4);
  const isCG=asset==='crypto'||asset==='meme';
  const cgId=r.coin?.id||sym.toLowerCase();

  if(isCG){
    const s1=r.sr?.score===0?{icon:'✅',cls:'ok',text:r.sr.note}:r.sr?.score<=1?{icon:'⚠️',cls:'warn-t',text:r.sr.note+' — verify on TokenUnlocks'}:{icon:'🚫',cls:'fail-t',text:'HIGH dilution — '+r.sr.note};
    const s4=decel?{icon:'✅',cls:'ok',text:`Decelerating: 7d ${c7.toFixed(1)}% vs 30d avg ${(c30/4).toFixed(1)}%/wk`}:{icon:'⚠️',cls:'warn-t',text:`Still falling: 7d ${c7.toFixed(1)}% — wait for stabilisation`};
    const s5=cache.social?{icon:'🔗',cls:'ok',text:'Social channels found — verify last activity'}:{icon:'…',cls:'',text:'Click Deep fetch to load'};
    const s6=cache.sectorPeers?.length?{icon:'📊',cls:'ok',text:`${cache.catSlug||r.sector} — ${cache.sectorPeers.length} peers loaded`}:{icon:'…',cls:'',text:'Click Deep fetch for sector data'};
    const s5lnk=cache.social?(
      (cache.social.twitter?`<a href="https://twitter.com/${cache.social.twitter}" target="_blank" class="rtt-link">Twitter</a> `:'')+
      (cache.social.telegram?`<a href="https://t.me/${cache.social.telegram}" target="_blank" class="rtt-link">Telegram</a> `:'')+
      (cache.social.homepage?`<a href="${cache.social.homepage}" target="_blank" class="rtt-link">Website</a> `:'')
    ):`<a href="https://coingecko.com/en/coins/${cgId}" target="_blank" class="rtt-link">CoinGecko →</a>`;
    const peerHTML=cache.sectorPeers?.length?`<div class="peers">${cache.sectorPeers.filter(p=>(p.symbol||'').toUpperCase()!==sym).slice(0,3).map(p=>{const pc=p.price_change_percentage_7d_in_currency||0;return`<div class="peer"><span class="mu">${(p.symbol||'').toUpperCase()}</span><span class="${pc>=0?'pos':'neg'}">${pc>=0?'+':''}${pc.toFixed(1)}% 7d</span></div>`;}).join('')}</div>`:'';
    return[
      step(1,'Unlock risk',s1,`<a href="https://tokenunlocks.app" target="_blank" class="rtt-link">TokenUnlocks →</a>`,'No major unlock in 30 days'),
      step(2,'On-chain',{icon:'🔍',cls:'',text:'Check for team/VC wallets moving to exchanges'},`<a href="https://etherscan.io/token/${cgId}" target="_blank" class="rtt-link">Explorer →</a> <a href="https://nansen.ai" target="_blank" class="rtt-link">Nansen →</a>`,'Large wallets holding, not selling'),
      step(3,'Perp + funding',{icon:'📊',cls:'',text:'Check funding rate direction and OI trend'},`<a href="https://www.coinglass.com" target="_blank" class="rtt-link">Coinglass →</a>`,'Funding negative/neutral · OI falling'),
      step(4,'Chart structure',s4,`<a href="https://www.tradingview.com/chart/?symbol=${sym}USDT" target="_blank" class="rtt-link">TradingView →</a>`,'Higher low forming on daily chart'),
      step(5,'Team activity',s5,s5lnk,'Official post within last 7 days'),
      step(6,'Sector health',s6,`<a href="https://www.coingecko.com/en/categories" target="_blank" class="rtt-link">CG sectors →</a>`,'Sector recovering · coin not lagging',peerHTML),
    ].join('');

async function fetchRTTDeep(asset,sym){
  const r=results[asset].find(x=>gSym(x)===sym);if(!r)return;
  const el=document.getElementById(`rtt-steps-${asset}-${sym}`);
  if(el)el.innerHTML=`<div style="padding:16px;text-align:center;color:var(--muted);font-size:11px"><span class="spinner-sm"></span>Fetching deep data...</div>`;
  try{
    const isCG=asset==='crypto'||asset==='meme';
    if(isCG){
      const cgId=r.coin?.id||sym.toLowerCase();
      const res=await fetch(`https://api.coingecko.com/api/v3/coins/${cgId}?localization=false&tickers=false&market_data=false&community_data=false&developer_data=false`);
      const d=await res.json();
      const social={twitter:d.links?.twitter_screen_name||null,telegram:d.links?.telegram_channel_identifier||null,homepage:d.links?.homepage?.[0]||null};
      const cats=d.categories||[];
      let sectorPeers=[],catSlug=cats.find(c=>c&&c.length>2)||'';
      if(catSlug){try{const pr=await fetch(`https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&category=${encodeURIComponent(catSlug)}&order=market_cap_desc&per_page=6&page=1&sparkline=false&price_change_percentage=7d`);if(pr.ok)sectorPeers=await pr.json();}catch(e){}}
      rttCache[asset][sym]={social,categories:cats,sectorPeers,catSlug};
    }else{
      const sectorMap={Technology:['AAPL','MSFT','NVDA'],Financials:['JPM','BAC','WFC'],Healthcare:['UNH','JNJ','PFE'],'Consumer Cyclical':['AMZN','TSLA','HD'],Communication:['GOOGL','META','NFLX'],Energy:['XOM','CVX','COP'],Industrials:['HON','UNP','CAT'],Utilities:['NEE','DUK','SO'],'Real Estate':['PLD','AMT','EQIX'],'Basic Materials':['LIN','APD','ECL']};
      const peerTickers=(sectorMap[r.sector]||['SPY','QQQ','IWM']).filter(t=>t!==sym).slice(0,3);
      const pd=await Promise.all(peerTickers.map(t=>fetchYahoo(t).catch(()=>null)));
      const sectorPeers=pd.filter(Boolean).map(p=>({ticker:p.ticker,c5d:p.c5d||0}));
      rttCache[asset][sym]={sectorPeers,catSlug:r.sector||''};
    }
    const el2=document.getElementById(`rtt-steps-${asset}-${sym}`);
    if(el2)el2.innerHTML=buildRTTSteps(r,asset);
  }catch(e){
    const el3=document.getElementById(`rtt-steps-${asset}-${sym}`);
    if(el3)el3.innerHTML=buildRTTSteps(r,asset)+`<div style="padding:8px 14px;font-size:10px;color:var(--red)">Deep fetch failed: ${e.message}</div>`;
  }
}

// ── HELPERS ──
function gSym(r){return r.coin?.symbol?.toUpperCase()||r.ticker||'';}
function gName(r){return r.coin?.name||r.name||'';}
function gPrice(r){return r.coin?.current_price||r.price||0;}
function gExch(r,asset){
  if(asset!=='crypto'&&asset!=='meme')return{name:'NYSE/NASDAQ',best:true};
  const wb=r.wb;
  if(wb?.on_bn_global)return{name:'Binance',best:true};
  if(wb?.on_coinbase)return{name:'Coinbase',best:true};
  if(wb?.wb_tradable)return{name:'Webull',best:true};
  if((r.vol||0)>5e6)return{name:'Binance likely',best:false};
  return{name:'Check',best:false};
}
function sBadge(v,colorOrCls){
  const isV=typeof colorOrCls==='string'&&colorOrCls.startsWith('var');
  const c=isV?colorOrCls:(colorOrCls==='tg'?'var(--green)':colorOrCls==='ta'?'var(--amber)':colorOrCls==='tr2'?'var(--red)':'var(--blue)');
  return`<span style="color:${c};font-weight:500">${v}</span><span class="sbar"><span class="sbar-fill" style="width:${v*10}%;background:${c}"></span></span>`;
}
function cp(t,btn){navigator.clipboard.writeText(String(t)).then(()=>{if(btn){btn.classList.add('copied');btn.textContent='✓';setTimeout(()=>{btn.classList.remove('copied');btn.textContent='⧉'},1200);}});}
function fmtP(p){if(!p)return'—';if(p>=1000)return'$'+p.toLocaleString(undefined,{maximumFractionDigits:0});if(p>=1)return'$'+p.toFixed(3);if(p>=0.01)return'$'+p.toFixed(5);return'$'+p.toFixed(7);}
function fmtV(v){if(!v)return'—';if(v>=1e12)return'$'+(v/1e12).toFixed(1)+'T';if(v>=1e9)return'$'+(v/1e9).toFixed(1)+'B';if(v>=1e6)return'$'+(v/1e6).toFixed(1)+'M';if(v>=1e3)return'$'+(v/1e3).toFixed(0)+'K';return'$'+Math.round(v);}
function trunc(s,n){return s&&s.length>n?s.slice(0,n-1)+'…':s||'';}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function setS(asset,msg,pct){const e=document.getElementById('status-'+asset);if(e)e.textContent=msg;if(pct!==undefined){const p=document.getElementById('pbar-'+asset);if(p)p.style.width=pct+'%';}}

// ── TEST TRACKER SYSTEM ──
// Uses localStorage to persist test sessions across browser visits.
// Each test session stores entry prices + an array of price updates over time.
// Excel export via SheetJS — dynamically loaded on demand.

const TEST_KEY = 'multi_asset_tests_v1';

function loadTests() {
  try { return JSON.parse(localStorage.getItem(TEST_KEY)||'[]'); }
  catch(e) { return []; }
}
function saveTests(tests) {
  try { localStorage.setItem(TEST_KEY, JSON.stringify(tests)); } catch(e) {}
}

// ── SELECTION MODAL STATE ──
let selAsset = null;
let selItems = [];  // all candidates for the modal
let selChecked = new Set();

function openSaveTestModal(asset) {
  const signals = results[asset];
  if(!signals || !signals.length) {
    alert('No scan results found. Run a scan first, then click Save Test.');
    return;
  }
  selAsset = asset;
  selItems = signals.map(r => ({
    sym:    gSym(r),
    name:   gName(r),
    price:  gPrice(r),
    action: r.action,
    prob:   r.prob,
    lv:     r.lv,
    sector: r.sector||'—',
    cgId:   r.coin?.id||null,
  }));
  // Pre-select all BUY signals
  selChecked = new Set(selItems.filter(x=>x.action==='BUY').map(x=>x.sym));
  renderSelList('');
  document.getElementById('sel-overlay').classList.add('show');
  document.getElementById('sel-search').value = '';
  updateSelCount();
}

function closeSel() {
  document.getElementById('sel-overlay').classList.remove('show');
}

function renderSelList(filter) {
  const f = filter.toUpperCase().trim();
  const visible = f ? selItems.filter(x=>x.sym.includes(f)||x.name.toUpperCase().includes(f)) : selItems;
  const list = document.getElementById('sel-list');
  if(!visible.length) { list.innerHTML='<div style="padding:14px;color:var(--muted);font-size:11px;text-align:center">No tokens match filter.</div>'; return; }
  list.innerHTML = visible.map(item => {
    const chk = selChecked.has(item.sym);
    const ac = item.action==='BUY'?'tg':item.action==='ACCUMULATE'?'tb':item.action==='WAIT'?'ta':'tm';
    return `<div class="sel-item" onclick="toggleSel('${item.sym}')">
      <input type="checkbox" id="chk-${item.sym}" ${chk?'checked':''} onclick="event.stopPropagation();toggleSel('${item.sym}')">
      <div class="sel-item-info">
        <div class="sel-item-sym" style="color:${COLORS[selAsset]}">${item.sym} <span class="tag ${ac}" style="font-size:9px">${item.action}</span></div>
        <div class="sel-item-meta">${item.name} · ${item.sector} · ${item.prob}% bounce prob · Liveness ${item.lv}/10</div>
      </div>
      <div style="font-weight:600;font-size:12px;color:${item.action==='BUY'?'var(--green)':'var(--muted)'}">${fmtP(item.price)}</div>
    </div>`;
  }).join('');
}

function toggleSel(sym) {
  if(selChecked.has(sym)) selChecked.delete(sym);
  else selChecked.add(sym);
  // update checkbox visually
  const chk = document.getElementById('chk-'+sym);
  if(chk) chk.checked = selChecked.has(sym);
  updateSelCount();
}

function selAll(buyOnly) {
  if(buyOnly) {
    selChecked = new Set(selItems.filter(x=>x.action==='BUY').map(x=>x.sym));
  } else {
    selChecked.clear();
  }
  renderSelList(document.getElementById('sel-search')?.value||'');
  updateSelCount();
}

function filterSelList() {
  renderSelList(document.getElementById('sel-search')?.value||'');
}

function updateSelCount() {
  const el = document.getElementById('sel-count');
  if(el) el.textContent = `${selChecked.size} token${selChecked.size!==1?'s':''} selected`;
}

function confirmSaveTest() {
  if(!selChecked.size) { alert('Select at least one token.'); return; }
  const today = new Date().toISOString().split('T')[0];
  const selected = selItems.filter(x=>selChecked.has(x.sym));
  const test = {
    id:       Date.now(),
    name:     `${LABELS[selAsset]} · ${today}`,
    asset:    selAsset,
    created:  today,
    regime:   document.getElementById('reg-label')?.textContent||'—',
    tokens:   selected.map(x => ({
      sym:    x.sym,
      name:   x.name,
      sector: x.sector,
      action: x.action,
      prob:   x.prob,
      lv:     x.lv,
      cgId:   x.cgId||null,
      updates: [{ date: today, price: x.price, label: 'Entry' }]
    }))
  };
  const tests = loadTests();
  tests.unshift(test);
  saveTests(tests);
  updateSnapBadge(selAsset);
  closeSel();
  switchPane(selAsset,'snap');
  alert(`✅ Test saved — ${selected.length} tokens tracked from today.\n\nCome back any day, open Test Tracker, and click "Update Prices" to record the new price column.\n\nUse "Export Excel" at any time to download the full price history.`);
}

// ── TEST TRACKER BADGE ──

      <div style="font-family:var(--disp);font-size:14px;margin-bottom:8px">No tests saved yet</div>
      <div style="font-size:11px;line-height:1.7">Run a scan → click <strong style="color:var(--amber)">🧪 Save Test</strong> → select your tokens → save.<br>
      Come back any day → click <strong>Update Prices</strong> to add a new price column.<br>
      Click <strong>Export Excel</strong> to download the full price history for analysis.</div>
    </div>`;
    return;
  }
  let html = `<div class="test-toolbar">
    <div style="font-size:11px;color:var(--muted)">${tests.length} test${tests.length>1?'s':''} saved in this browser</div>
  </div>`;
  tests.forEach(test => {

    const latestDate = updateDates[updateDates.length-1];
    html+=`<div class="test-card" id="tcard-${test.id}">

        <div class="test-card-title">${test.name}</div>

      </div>
      <div class="test-card-meta">

        ${updateDates.length} price update${updateDates.length!==1?'s':''} · 
        Latest: ${latestDate} · 
        Regime at start: ${test.regime}
      </div>
      <div class="test-card-btns">
        <button class="scan-btn" style="font-size:10px;padding:4px 12px;background:var(--s3);color:var(--text);border:1px solid var(--b2)" onclick="viewTest(${test.id},'${asset}')">👁 View table</button>
        <button class="scan-btn" style="font-size:10px;padding:4px 12px;background:var(--blue);color:#fff" onclick="updateTestPrices(${test.id},'${asset}')">↻ Update prices</button>
        <button class="scan-btn" style="font-size:10px;padding:4px 12px;background:var(--green);color:#000" onclick="exportTestExcel(${test.id})">⬇ Export Excel</button>
