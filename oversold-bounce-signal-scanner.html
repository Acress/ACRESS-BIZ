function deleteTest(id) {
  if(!confirm('Delete this test? All price history will be lost.'))return;
  saveTests(loadTests().filter(t=>t.id!==id));
  const asset = document.querySelector('.atab.active')?.id?.replace('atab-','');
  if(asset) { updateSnapBadge(asset); renderSnapshots(asset); }
}

// ── VIEW TEST TABLE ──
function viewTest(id, asset) {
  const test = loadTests().find(t=>t.id===id);
  if(!test) return;
  const el = document.getElementById('tview-'+id);
  if(!el) return;
  if(el.style.display !== 'none') { el.style.display='none'; return; }

  // All unique dates across all tokens
  const allDates = [...new Set(test.tokens.flatMap(t=>t.updates.map(u=>u.date)))].sort();

  let html = `<div style="overflow-x:auto"><table class="upd-tbl">
    <thead><tr>
      <th>Ticker</th><th>Name</th><th>Sector</th><th>Action</th><th>Prob</th><th>Live</th>
      ${allDates.map((d,i)=>`<th style="${i===0?'color:var(--amber)':''}">${i===0?'📍 ':''}${d}${i===0?' (entry)':''}<br><span style="font-size:8px;color:var(--muted)">${i>0?'Day '+Math.round((new Date(d)-new Date(allDates[0]))/864e5):''}</span></th>`).join('')}
      ${allDates.length>1?'<th>Return</th><th>Outcome</th>':''}
    </tr></thead><tbody>`;

  test.tokens.forEach(tok => {
    const priceMap = {};
    tok.updates.forEach(u => priceMap[u.date]=u.price);
    const entry = priceMap[allDates[0]];
    const latest = priceMap[allDates[allDates.length-1]];
    const ret = entry && latest ? (latest-entry)/entry*100 : null;
    const retStr = ret!=null ? (ret>=0?'+':'')+ret.toFixed(1)+'%' : '—';
    const retColor = ret==null?'var(--muted)':ret>0?'var(--green)':'var(--red)';
    const outcome = ret==null?'—':ret>=22?'✅ +22% target':ret<=-10?'🛑 -10% stop':ret>=0?'⏳ Positive':'⏳ Negative';
    const ac = tok.action==='BUY'?'tg':tok.action==='ACCUMULATE'?'tb':tok.action==='WAIT'?'ta':'tm';
    html+=`<tr>
      <td style="font-weight:600;color:${COLORS[asset]}">${tok.sym}</td>
      <td>${trunc(tok.name,14)}</td>
      <td><span class="tag tm" style="font-size:9px">${tok.sector}</span></td>
      <td><span class="tag ${ac}">${tok.action}</span></td>
      <td>${tok.prob}%</td>
      <td>${tok.lv}/10</td>
      ${allDates.map((d,i)=>{
        const p=priceMap[d];
        const chg = i>0&&entry&&p ? (p-entry)/entry*100 : null;
        return `<td style="${i===0?'color:var(--amber);font-weight:600':''}">
          ${p?fmtP(p):'—'}
          ${chg!=null?`<br><span style="font-size:9px;color:${chg>=0?'var(--green)':'var(--red)'}">${chg>=0?'+':''}${chg.toFixed(1)}%</span>`:''}
        </td>`;
      }).join('')}
      ${allDates.length>1?`<td style="font-weight:600;color:${retColor}">${retStr}</td><td>${outcome}</td>`:''}
    </tr>`;
  });

  html += '</tbody></table></div>';
  el.innerHTML = html;
  el.style.display = 'block';
}

// ── UPDATE PRICES ──
async function updateTestPrices(id, asset) {
  const tests = loadTests();
  const test = tests.find(t=>t.id===id);
  if(!test)return;
  const today = new Date().toISOString().split('T')[0];

  // Check if today already recorded
  const alreadyToday = test.tokens.some(t=>t.updates.some(u=>u.date===today));
  if(alreadyToday) {
    if(!confirm(`You already have a price update for today (${today}). Update again to overwrite today's prices?`)) return;
  }

  const btn = document.querySelector(`#tcard-${id} .scan-btn[onclick*='updateTestPrices']`);
  if(btn){btn.disabled=true;btn.textContent='⏳ Fetching...';}
  const isCG = asset==='crypto'||asset==='meme';

  try {
    if(isCG) {
      const withIds    = test.tokens.filter(t=>t.cgId);
      const withoutIds = test.tokens.filter(t=>!t.cgId);
      const priceMap = {};
      for(let i=0;i<withIds.length;i+=50){
        const batch=withIds.slice(i,i+50);
        const ids=batch.map(t=>t.cgId).join(',');
        try{
          const r=await fetch(`https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${ids}&order=market_cap_desc&per_page=50&page=1&sparkline=false`);
          if(r.ok){const d=await r.json();d.forEach(c=>priceMap[c.id]=c.current_price);}
        }catch(e){}
        if(i+50<withIds.length)await sleep(600);
      }
      for(const tok of withoutIds){
        try{
          const sr=await fetch(`https://api.coingecko.com/api/v3/search?query=${encodeURIComponent(tok.sym)}`);
          const sd=await sr.json();
          const match=(sd.coins||[]).find(c=>c.symbol.toUpperCase()===tok.sym);
          if(match){tok.cgId=match.id;const mr=await fetch(`https://api.coingecko.com/api/v3/coins/${match.id}?localization=false&tickers=false&market_data=true&community_data=false&developer_data=false`);const md=await mr.json();priceMap[match.id]=md.market_data?.current_price?.usd||null;}
          await sleep(300);
        }catch(e){}
      }
      test.tokens.forEach(tok => {
        const p = tok.cgId ? priceMap[tok.cgId] : null;
        if(p) {
          const existing = tok.updates.findIndex(u=>u.date===today);
          const entry = { date:today, price:p, label:'Day '+Math.round((new Date(today)-new Date(test.created))/864e5) };
          if(existing>=0) tok.updates[existing]=entry;
          else tok.updates.push(entry);
        }
      });
    } else {
      const batchSize=15;
      for(let i=0;i<test.tokens.length;i+=batchSize){
        const batch=test.tokens.slice(i,i+batchSize);
        const prices=await Promise.all(batch.map(t=>fetchYahoo(t.sym).catch(()=>null)));
        batch.forEach((tok,j)=>{
          const p=prices[j]?.price||null;
          if(p){
            const daysIn=Math.round((new Date(today)-new Date(test.created))/864e5);
            const existing=tok.updates.findIndex(u=>u.date===today);
            const entry={date:today,price:p,label:'Day '+daysIn};
            if(existing>=0) tok.updates[existing]=entry;
            else tok.updates.push(entry);
          }
        });
        if(i+batchSize<test.tokens.length)await sleep(150);
      }
    }

    saveTests(tests);
    renderSnapshots(asset);
    viewTest(id, asset);
    if(btn){btn.disabled=false;btn.textContent='↻ Update prices';}
    alert(`✅ Prices updated for ${today}.\n\nYou now have ${test.tokens[0]?.updates.length||0} price columns.\nClick "Export Excel" to download the full history.`);
  } catch(e) {
    if(btn){btn.disabled=false;btn.textContent='↻ Update prices';}
    alert('Error fetching prices: '+e.message);
  }
}

// ── EXPORT TO EXCEL ──
async function exportTestExcel(id) {
  const test = loadTests().find(t=>t.id===id);
  if(!test){alert('Test not found.');return;}

  // Load SheetJS dynamically
  if(typeof XLSX === 'undefined') {
    await new Promise((res,rej)=>{
      const s=document.createElement('script');
      s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
      s.onload=res;s.onerror=rej;
      document.head.appendChild(s);
    });
  }

  const allDates = [...new Set(test.tokens.flatMap(t=>t.updates.map(u=>u.date)))].sort();
  const entryDate = allDates[0];

  // ── SHEET 1: Price History ──
  const headers = ['Ticker','Name','Sector','Action','Bounce Prob %','Liveness /10',
    ...allDates.map((d,i)=>i===0?`Entry Price (${d})`:`Price on ${d} (Day ${Math.round((new Date(d)-new Date(entryDate))/864e5)})`),
    ...allDates.slice(1).map((d,i)=>`Return Day ${Math.round((new Date(d)-new Date(entryDate))/864e5)} %`),
    'Current Return %','Outcome','Notes'
  ];

  const rows = test.tokens.map(tok => {
    const priceMap = {};
    tok.updates.forEach(u=>priceMap[u.date]=u.price);
    const entryPrice = priceMap[entryDate];
    const latestDate = allDates[allDates.length-1];
    const latestPrice = priceMap[latestDate];
    const curRet = entryPrice&&latestPrice ? ((latestPrice-entryPrice)/entryPrice*100) : null;
    const outcome = curRet==null?'No data':curRet>=22?'Target hit (+22%)':curRet<=-10?'Stop hit (-10%)':curRet>=0?'Open - positive':'Open - negative';
    const row = [
      tok.sym, tok.name, tok.sector, tok.action, tok.prob, tok.lv,
      ...allDates.map(d=>priceMap[d]||''),
      ...allDates.slice(1).map(d=>{
        const p=priceMap[d];
        return entryPrice&&p ? parseFloat(((p-entryPrice)/entryPrice*100).toFixed(2)) : '';
      }),
      curRet!=null ? parseFloat(curRet.toFixed(2)) : '',
      outcome, ''
    ];
    return row;
  });

  const ws1Data = [headers,...rows];

  // ── SHEET 2: Summary Stats ──
  const resolved = test.tokens.filter(tok=>{
    const priceMap={};tok.updates.forEach(u=>priceMap[u.date]=u.price);
    const e=priceMap[entryDate],l=priceMap[allDates[allDates.length-1]];
    if(!e||!l)return false;
    const r=(l-e)/e*100;
    return r>=22||r<=-10;
  });
  const wins = test.tokens.filter(tok=>{
    const pm={};tok.updates.forEach(u=>pm[u.date]=u.price);
    const e=pm[entryDate],l=pm[allDates[allDates.length-1]];
    return e&&l&&(l-e)/e*100>=22;
  }).length;
  const losses = resolved.length - wins;
  const returns = test.tokens.map(tok=>{
    const pm={};tok.updates.forEach(u=>pm[u.date]=u.price);
    const e=pm[entryDate],l=pm[allDates[allDates.length-1]];
    return e&&l?(l-e)/e*100:null;
  }).filter(x=>x!=null);
  const avgRet = returns.length ? returns.reduce((a,b)=>a+b,0)/returns.length : 0;

  const ws2Data = [
    ['Test Summary'],[''],
    ['Test name', test.name],
    ['Asset class', LABELS[test.asset]],
    ['Start date', entryDate],
    ['Latest update', allDates[allDates.length-1]],
    ['Days tracked', Math.round((new Date(allDates[allDates.length-1])-new Date(entryDate))/864e5)],
    ['Regime at start', test.regime],
    [''],
    ['Total tokens', test.tokens.length],
    ['Price updates recorded', allDates.length],
    [''],
    ['Performance (resolved trades only)'],
    ['Target hit (+22%)', wins],
    ['Stop hit (-10%)', losses],
    ['Win rate', resolved.length>0?parseFloat((wins/resolved.length*100).toFixed(1))+'%':'Not enough data'],
    ['Average return (all tokens)', parseFloat(avgRet.toFixed(2))+'%'],
    [''],
    ['How to share with Claude for analysis'],
    ['1. Copy this file and paste it into a Claude conversation'],
    ['2. Ask: "Analyse this test data. I held for X days. What was the win rate, average return,'],
    ['   best and worst performers, and what does this tell me about the tool accuracy?"'],
  ];

  // ── SHEET 3: Raw Updates Log ──
  const ws3Data = [['Ticker','Name','Update Date','Days from entry','Price','Label']];
  test.tokens.forEach(tok=>{
    tok.updates.forEach(u=>{
      ws3Data.push([tok.sym,tok.name,u.date,Math.round((new Date(u.date)-new Date(entryDate))/864e5),u.price,u.label||'']);
    });
  });

  const wb = XLSX.utils.book_new();
  const ws1 = XLSX.utils.aoa_to_sheet(ws1Data);
  const ws2 = XLSX.utils.aoa_to_sheet(ws2Data);
  const ws3 = XLSX.utils.aoa_to_sheet(ws3Data);

  // Column widths for sheet 1
  ws1['!cols'] = [
    {wch:8},{wch:18},{wch:12},{wch:12},{wch:10},{wch:8},
    ...allDates.map(()=>({wch:16})),
    ...allDates.slice(1).map(()=>({wch:14})),
    {wch:14},{wch:22},{wch:20}
  ];

  XLSX.utils.book_append_sheet(wb,ws1,'Price History');
  XLSX.utils.book_append_sheet(wb,ws2,'Summary');
  XLSX.utils.book_append_sheet(wb,ws3,'Raw Updates');

  const filename = `test_${test.asset}_${entryDate}_${allDates.length}updates.xlsx`;
  XLSX.writeFile(wb, filename);
}


// ── IS COIN DEAD? VIABILITY CHECK ──
async function runViabilityCheck(asset, sym) {
  const r = results[asset].find(x=>gSym(x)===sym);
  if(!r) return;
  const el = document.getElementById(`viability-${asset}-${sym}`);
  if(!el) return;
  el.innerHTML=`<div style="padding:12px 14px;font-size:11px;color:var(--muted);display:flex;align-items:center;gap:8px"><span class="spinner-sm"></span>Running viability checks — GitHub, TVL, tokenomics, team...</div>`;

  const cgId = r.coin?.id || sym.toLowerCase();
  const checks = [];

  // ── 1. DEV DATA (GitHub) ──
  let devData=null, links=null;
  try {
    const res = await fetch(`https://api.coingecko.com/api/v3/coins/${cgId}?localization=false&tickers=false&market_data=false&community_data=false&developer_data=true&sparkline=false`);
    if(res.ok){ const d=await res.json(); devData=d.developer_data||null; links=d.links||null; }
  } catch(e){}

  // GitHub commits
  if(devData) {
    const c4w = devData.commit_count_4_weeks||0;
    const hasRepo = devData.forks>0||devData.stars>0;
    if(c4w>=10)       checks.push({label:'GitHub: Very active',     sub:`${c4w} commits in 4 weeks`,              status:'pass',    icon:'✅'});
    else if(c4w>=1)   checks.push({label:'GitHub: Some activity',   sub:`${c4w} commits — slowing down`,          status:'warn',    icon:'⚠️'});
    else if(hasRepo)  checks.push({label:'GitHub: No recent commits',sub:'0 commits in 4 weeks — possible abandon',status:'fail',    icon:'🚫'});
    else              checks.push({label:'GitHub: No repo data',     sub:'No open-source repo on CoinGecko',       status:'unknown', icon:'❓'});
  } else {
    checks.push({label:'GitHub: Unavailable', sub:'Could not fetch developer data', status:'unknown', icon:'❓'});
  }

  // ── 2. TOKENOMICS ──
  const circ = r.coin?.circulating_supply||0;
  const total = r.coin?.total_supply||circ||1;
  if(circ&&total) {
    const pct = (circ/total*100).toFixed(0);
    const locked = 100-parseFloat(pct);
    if(locked<=15)      checks.push({label:'Tokenomics: Clean',       sub:`${pct}% circulating — low dilution risk`,          status:'pass', icon:'✅'});
    else if(locked<=40) checks.push({label:'Tokenomics: Moderate risk',sub:`${pct}% circulating — ${locked}% still locked`,   status:'warn', icon:'⚠️'});
    else                checks.push({label:'Tokenomics: High risk',    sub:`Only ${pct}% circulating — ${locked}% to be sold`, status:'fail', icon:'🚫'});
  } else {
    checks.push({label:'Tokenomics: No data', sub:'Supply data unavailable', status:'unknown', icon:'❓'});
  }

  // ── 3. TVL (DeFiLlama) ──
  try {
    const llaRes = await fetch('https://api.llama.fi/protocols');
    if(llaRes.ok) {
      const protocols = await llaRes.json();
      const match = protocols.find(p=>p.symbol?.toLowerCase()===sym.toLowerCase()||p.name?.toLowerCase()===gName(r)?.toLowerCase());
      if(match) {
        const tvl=match.tvl||0, chg=match.change_7d||0;
        const tvlFmt = tvl>=1e9?'$'+(tvl/1e9).toFixed(1)+'B':tvl>=1e6?'$'+(tvl/1e6).toFixed(1)+'M':'$'+(tvl/1e3).toFixed(0)+'K';
        if(tvl>=1e6&&chg>=-20)  checks.push({label:'TVL: Active protocol', sub:`${tvlFmt} TVL · 7d: ${chg>=0?'+':''}${chg.toFixed(1)}%`, status:chg>=0?'pass':'warn', icon:chg>=0?'✅':'⚠️'});
        else if(tvl<100000)     checks.push({label:'TVL: Abandoned',        sub:`${tvlFmt} — essentially no usage`,                        status:'fail',              icon:'🚫'});
        else                    checks.push({label:'TVL: Declining',         sub:`${tvlFmt} · 7d: ${chg.toFixed(1)}% — users leaving`,      status:'warn',              icon:'⚠️'});
      } else {
        checks.push({label:'TVL: Not a DeFi protocol', sub:'Check on-chain transaction activity manually', status:'unknown', icon:'ℹ️'});
      }
    }
  } catch(e){ checks.push({label:'TVL: Fetch failed', sub:'DeFiLlama unavailable', status:'unknown', icon:'❓'}); }

  // ── 4. TEAM SOCIAL CHANNELS ──
  const twitter = links?.twitter_screen_name||null;
  const telegram = links?.telegram_channel_identifier||null;
  const homepage = links?.homepage?.[0]||null;
  if(twitter||telegram) {
    const chans = [twitter?`@${twitter}`:null, telegram?'Telegram':null, homepage?'Website':null].filter(Boolean);
    checks.push({
      label:'Team channels: Found', sub:`${chans.join(' · ')} — verify last post date manually`,
      status:'warn', icon:'🔗',
      links:[
        twitter?`<a href="https://twitter.com/${twitter}" target="_blank" style="color:var(--blue);text-decoration:none;font-size:10px;padding:2px 6px;border:1px solid rgba(77,159,255,0.3);border-radius:3px">Twitter →</a>`:null,
        telegram?`<a href="https://t.me/${telegram}" target="_blank" style="color:var(--blue);text-decoration:none;font-size:10px;padding:2px 6px;border:1px solid rgba(77,159,255,0.3);border-radius:3px">Telegram →</a>`:null,
        homepage?`<a href="${homepage}" target="_blank" style="color:var(--blue);text-decoration:none;font-size:10px;padding:2px 6px;border:1px solid rgba(77,159,255,0.3);border-radius:3px">Website →</a>`:null,
      ].filter(Boolean).join(' ')
    });
  } else {
    checks.push({label:'Team channels: Not found', sub:'No Twitter/Telegram on CoinGecko — red flag', status:'fail', icon:'🚫'});
  }

  // ── 5. TRADING ACTIVITY ──
  const vol = r.coin?.total_volume||0;
  const mcap = r.coin?.market_cap||1;
  const ratio = vol/mcap;
  if(ratio>0.01&&vol>100000)  checks.push({label:'Trading: Active market',  sub:`Vol/MCap ${(ratio*100).toFixed(1)}% · $${(vol/1e6).toFixed(2)}M daily`, status:'pass', icon:'✅'});
  else if(vol>10000)           checks.push({label:'Trading: Thin liquidity', sub:`Only $${(vol/1e3).toFixed(0)}K daily — hard to exit`,                   status:'warn', icon:'⚠️'});
  else                         checks.push({label:'Trading: Dead market',    sub:'Under $10K daily volume — no real market',                               status:'fail', icon:'🚫'});

  // ── 6. EXCHANGE TIER ──
  const wb = r.wb||WB_MAP[sym]||null;
  if(wb?.on_bn_global||wb?.on_coinbase) {
    const ex=[wb.on_bn_global?'Binance':null, wb.on_coinbase?'Coinbase':null, wb.wb_tradable?'Webull':null].filter(Boolean);
    checks.push({label:'Exchange: Major listing', sub:`On ${ex.join(', ')} — vetted by top exchanges`, status:'pass', icon:'✅'});
  } else if(vol>500000) {
    checks.push({label:'Exchange: Mid-tier', sub:'Not on Binance/Coinbase but has volume', status:'warn', icon:'⚠️'});
  } else {
    checks.push({label:'Exchange: Low-tier only', sub:'Small exchanges only — rug and delisting risk', status:'fail', icon:'🚫'});
  }

  // ── VERDICT ──
  const passes = checks.filter(c=>c.status==='pass').length;
  const fails  = checks.filter(c=>c.status==='fail').length;
  const warns  = checks.filter(c=>c.status==='warn').length;

  let verdict, vcol, vsub;
  if(fails>=3)      { verdict='🪦 LIKELY DEAD';           vcol='var(--red)';   vsub='Multiple critical failures. This is probably a zombie project. Avoid.'; }
  else if(fails>=2) { verdict='⚠️ HIGH RISK';             vcol='var(--red)';   vsub='Serious red flags. Oversold may be a trap — reduce size or skip.'; }
  else if(fails===1||warns>=3){ verdict='⚠️ PROCEED WITH CAUTION'; vcol='var(--amber)'; vsub='Some concerns. Do manual checks before entering.'; }
  else if(passes>=4){ verdict='✅ LIKELY ALIVE';           vcol='var(--green)'; vsub='Project shows signs of life. Oversold signal has fundamental backing.'; }
  else              { verdict='🔍 INCONCLUSIVE';           vcol='var(--blue)';  vsub='Not enough data. Manual investigation needed.'; }

  const bgCol = fails>=2?'var(--rdim)':fails===1||warns>=3?'var(--adim)':passes>=4?'var(--gdim)':'var(--s2)';

  el.innerHTML=`
    <div class="viability-banner" style="background:${bgCol}">
      <div style="flex:1">
        <div style="font-family:var(--disp);font-size:16px;font-weight:700;color:${vcol};display:flex;align-items:center;gap:8px">${verdict}</div>
        <div style="font-size:11px;color:var(--text);margin-top:3px">${vsub}</div>
        <div style="margin-top:8px;display:flex;flex-wrap:wrap">
          ${checks.map(c=>`<span class="vcheck ${c.status}" title="${c.sub}">${c.icon} ${c.label}</span>`).join('')}
        </div>
      </div>
      <div style="text-align:center;flex-shrink:0">
        <div style="font-family:var(--disp);font-size:28px;font-weight:700;color:${vcol}">${passes}/${checks.length}</div>
        <div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">passed</div>
      </div>
    </div>
    <div style="padding:10px 13px">
      ${checks.map(c=>`
        <div style="display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--b)">
          <span style="font-size:13px;flex-shrink:0">${c.icon}</span>
          <div style="flex:1">
            <div style="font-weight:500;font-size:11px;color:${c.status==='pass'?'var(--green)':c.status==='fail'?'var(--red)':c.status==='warn'?'var(--amber)':'var(--muted)'}">${c.label}</div>
            <div style="font-size:10px;color:var(--muted);margin-top:1px">${c.sub}</div>
            ${c.links?`<div style="margin-top:4px">${c.links}</div>`:''}
          </div>
        </div>`).join('')}
      <div style="margin-top:8px;padding:8px;background:var(--s3);border-radius:4px;font-size:10px;color:var(--muted)">
        <strong style="color:var(--text)">Also check manually:</strong> Token unlocks → tokenunlocks.app · Wallet movements → Nansen/explorer · Team's last tweet/post date
      </div>
    </div>`;
}
